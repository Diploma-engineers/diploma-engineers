<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Team - Diploma Engineers</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* BACKGROUND */
body{
    height:100vh;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

/* CENTER BOX */
.coming{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* TITLE */
.coming h1{
    font-size:32px;
    margin-bottom:10px;
}

/* SUBTEXT */
.coming p{
    color:#aaa;
    margin-bottom:25px;
}

/* BUTTON */
.coming a{
    text-decoration:none;
    color:#22c55e;
    border:1px solid #22c55e;
    padding:10px 20px;
    border-radius:10px;
    transition:0.3s;
}

.coming a:hover{
    background:#22c55e;
    color:black;
    transform:scale(1.05);
}

/* ANIMATION */
@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.coming{
    animation:fade 0.8s ease;
}
</style>
</head>

<body>

<div class="coming">
    <h1>👥 Our Team</h1>
    <p>We are building something awesome 🚀</p>
    <p>Team Section Coming Soon...</p>

    <a href="index.html">⬅ Back to Home</a>
</div>

</body>
</html>
