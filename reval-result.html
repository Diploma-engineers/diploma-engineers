<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Revaluation Result | Diploma Engineers</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================================
GLOBAL
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    background:#f1f5f9;

    overflow:hidden;

}

/* =========================================
BACKGROUND CIRCLES
========================================= */

.bg-circle{

    position:absolute;

    border-radius:50%;

    filter:blur(80px);

    z-index:0;

}

.circle1{

    width:260px;
    height:260px;

    background:#3b82f6;

    top:-80px;
    left:-80px;

    opacity:0.25;

}

.circle2{

    width:260px;
    height:260px;

    background:#22c55e;

    bottom:-80px;
    right:-80px;

    opacity:0.25;

}

/* =========================================
CARD
========================================= */

.card{

    width:100%;
    max-width:430px;

    background:#ffffff;

    border-radius:28px;

    padding:35px 28px;

    position:relative;

    z-index:10;

    box-shadow:0 15px 40px rgba(0,0,0,0.08);

    border:1px solid #e2e8f0;

    text-align:center;

}

/* =========================================
ICON
========================================= */

.icon{

    width:85px;
    height:85px;

    margin:auto;

    border-radius:22px;

    background:#eff6ff;

    color:#2563eb;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:34px;

    margin-bottom:20px;

}

/* =========================================
TEXT
========================================= */

.card h2{

    font-size:30px;

    color:#0f172a;

    margin-bottom:10px;

    font-weight:700;

}

.card p{

    color:#64748b;

    font-size:14px;

    line-height:1.7;

    margin-bottom:25px;

}

/* =========================================
INPUT BOX
========================================= */

.input-box{

    position:relative;

    margin-bottom:18px;

}

.input-box i{

    position:absolute;

    left:16px;
    top:50%;

    transform:translateY(-50%);

    color:#64748b;

    font-size:15px;

}

input{

    width:100%;

    padding:15px 15px 15px 45px;

    border-radius:16px;

    border:1px solid #cbd5e1;

    background:#f8fafc;

    outline:none;

    font-size:15px;

    transition:0.3s;

}

input:focus{

    border-color:#2563eb;

    background:#ffffff;

}

/* =========================================
BUTTONS
========================================= */

button{

    width:100%;

    border:none;

    border-radius:16px;

    padding:15px;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;

}

/* GENERATE */

.generate-btn{

    background:#2563eb;

    color:white;

    margin-top:5px;

}

.generate-btn:hover{

    background:#1d4ed8;

    transform:translateY(-3px);

}

/* OPEN */

.view{

    display:none;

    background:#22c55e;

    color:white;

    margin-top:14px;

}

.view.active{

    display:block;

}

.view:hover{

    background:#16a34a;

    transform:translateY(-3px);

}

/* =========================================
SUCCESS MESSAGE
========================================= */

.success{

    display:none;

    margin-top:18px;

    background:#ecfdf5;

    color:#15803d;

    padding:13px;

    border-radius:14px;

    font-size:14px;

    border:1px solid #bbf7d0;

}

.success.active{

    display:block;

}

/* =========================================
FOOT TEXT
========================================= */

.footer-text{

    margin-top:20px;

    font-size:13px;

    color:#94a3b8;

}

/* =========================================
MOBILE
========================================= */

@media(max-width:600px){

    .card{

        padding:28px 20px;

        border-radius:24px;

    }

    .card h2{

        font-size:26px;

    }

}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<!-- CARD -->

<div class="card">

<div class="icon">

<i class="fa-solid fa-rotate"></i>

</div>

<h2>Revaluation Result</h2>

<p>

Generate and open your Diploma Engineering Revaluation Result quickly and securely.

</p>

<!-- ENROLLMENT -->

<div class="input-box">

<i class="fa-solid fa-id-card"></i>

<input type="text" id="enroll" placeholder="Enrollment Number">

</div>

<!-- DOB -->

<div class="input-box">

<i class="fa-solid fa-calendar-days"></i>

<input type="text" id="dob" placeholder="DD/MM/YYYY">

</div>

<!-- GENERATE BUTTON -->

<button class="generate-btn" onclick="generate()">

<i class="fa-solid fa-link"></i>

Generate Link

</button>

<!-- SUCCESS -->

<div class="success" id="msg">

✅ Link Generated Successfully

</div>

<!-- OPEN RESULT -->

<button class="view" id="openBtn" onclick="openResult()">

<i class="fa-solid fa-arrow-up-right-from-square"></i>

Open Result

</button>

<!-- FOOTER -->

<div class="footer-text">

Developed by Diploma Engineers

</div>

</div>

<!-- =========================================
JAVASCRIPT
========================================= -->

<script>

let finalURL = "";

/* DOB VALIDATION */

function validDOB(d){

return /^(\d{2})\/(\d{2})\/(\d{4})$/.test(d);

}

/* GENERATE LINK */

function generate(){

let enroll = document.getElementById("enroll").value.trim();

let dob = document.getElementById("dob").value.trim();

if(!enroll){

alert("Please Enter Enrollment Number");

return;

}

if(!validDOB(dob)){

alert("Please Enter DOB in DD/MM/YYYY");

return;

}

/* ENCODE */

let encEnroll = btoa(enroll);

let encDob = encodeURIComponent(btoa(dob));

/* FINAL URL */

finalURL = `https://result.bteexam.com/Odd_Semester/reval/REVAL_RollNo.aspx?id=${encEnroll}&id2=${encDob}`;

/* SHOW SUCCESS */

document.getElementById("msg").classList.add("active");

document.getElementById("openBtn").classList.add("active");

}

/* OPEN RESULT */

function openResult(){

if(finalURL){

window.open(finalURL,"_blank");

}else{

alert("Generate Link First");

}

}

</script>

</body>
</html>
