<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel</title>
<style>
body{margin:0;font-family:Arial;background:#f5f7fb}
.container{max-width:900px;margin:20px auto;padding:16px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input,textarea,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:8px}
button{padding:10px 16px;border:0;border-radius:8px;background:#0d6efd;color:#fff;cursor:pointer}
.item{border-top:1px solid #ddd;padding:10px 0}
.small{color:#666;font-size:13px}
</style>
</head>
<body>
<div id="header"></div>

<div class="container">
<div class="card">
<h2>News Admin Panel</h2>
<input id="title" placeholder="News Title">
<textarea id="desc" placeholder="Description"></textarea>
<input id="thumb" placeholder="Thumbnail URL">
<input id="pdf" placeholder="Google Drive / PDF Link">
<select id="cat">
<option>Notice</option><option>Result</option><option>Admission</option>
</select>
<button onclick="publishNews()">Publish</button>
</div>

<div class="card" style="margin-top:20px">
<h3>Published News</h3>
<div id="list"></div>
</div>
</div>

<div id="footer"></div>

<script>
fetch("header.html").then(r=>r.text()).then(t=>header.innerHTML=t);
fetch("footer.html").then(r=>r.text()).then(t=>footer.innerHTML=t);

let news=JSON.parse(localStorage.getItem("news")||"[]");

function save(){localStorage.setItem("news",JSON.stringify(news));render();}

function publishNews(){
news.unshift({
title:title.value,
desc:desc.value,
thumb:thumb.value,
pdf:pdf.value,
cat:cat.value,
date:new Date().toLocaleString()
});
title.value=desc.value=thumb.value=pdf.value="";
save();
alert("News Published");
}

function del(i){
if(confirm("Delete news?")){news.splice(i,1);save();}
}

function render(){
list.innerHTML="";
news.forEach((n,i)=>{
list.innerHTML+=`
<div class="item">
<b>${n.title}</b><br>
<span class="small">${n.cat} | ${n.date}</span><br>
${n.thumb?`<img src="${n.thumb}" style="width:120px;border-radius:8px;margin:8px 0">`:""}
<div>${n.desc}</div>
<a href="${n.pdf}" target="_blank">Open PDF</a><br><br>
<button onclick="del(${i})">Delete</button>
</div>`;
});
}
render();
</script>
</body>
</html>
