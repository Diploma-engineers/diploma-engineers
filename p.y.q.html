/* ================= MAIN CONTAINER ================= */

/* ================= TITLE ================= */

.page-title{

    font-size:38px;
    font-weight:700;

}

.page-subtitle{
    text-align:center;
    color:#64748b;

    font-size:15px;

/* ================= SEARCH ================= */

.search-box{
    width:100%;
    padding:15px 18px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    font-size:15px;
    margin-bottom:25px;
    transition:.3s;
    background:#f8fafc;
}

.search-box:focus{
    outline:none;
    border-color:#2563eb;
    background:#fff;
    box-shadow:0 0 0 4px rgba(37,99,235,0.10);
}

/* ================= TABLE ================= */

.table-container{
    overflow-x:auto;
    border-radius:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    position:sticky;
    top:0;
    z-index:5;
}

th{
    background:#2563eb;
    color:#fff;
    padding:16px;
    font-size:15px;
    font-weight:600;
}

td{
    padding:18px 16px;
    border-bottom:1px solid #e2e8f0;
    font-size:15px;
}

tbody tr{
    transition:.25s;
}

tbody tr:hover{
    background:#f8fafc;
}

/* ================= BUTTON ================= */

.download-btn{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:#fff;
    padding:10px 18px;
    border-radius:10px;
    text-decoration:none;
    font-size:14px;
    font-weight:500;
    transition:.3s;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.download-btn:hover{
    transform:translateY(-2px);
    color:#fff;
    box-shadow:0 8px 20px rgba(34,197,94,.25);
}

/* ================= PAGINATION ================= */

.pagination-box{
    text-align:center;
    margin-top:35px;
}

.pagination-box button{
    border:none;
    background:#e2e8f0;
    width:42px;
    height:42px;
    margin:4px;
    border-radius:10px;
    font-weight:600;
    transition:.3s;
}

.pagination-box button:hover{
    background:#cbd5e1;
    transform:translateY(-2px);
}

.pagination-box button.active{
    background:#2563eb;
    color:#fff;
    box-shadow:0 5px 15px rgba(37,99,235,.25);
}

/* ================= EMPTY STATE ================= */

.empty-state{
    text-align:center;
    padding:30px;
    color:#ef4444;
    font-weight:600;
    font-size:16px;
}

/* ================= ANIMATION ================= */

@keyframes fadeIn{

from{
    opacity:0;
    transform:translateY(20px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}

/* ================= MOBILE ================= */

@media(max-width:768px){

.main-container{
    margin:15px;
    padding:20px;
}

.page-title{
    font-size:28px;

.page-subtitle{
    font-size:14px;
}

th,td{

.download-btn{
    padding:8px 12px;
    font-size:12px;
}

.pagination-box button{
    width:38px;
    height:38px;
}

}

/* ================= VARIABLES ================= */

let currentPage = 1;
const rowsPerPage = 5;
let filteredData = fullData;

/* ================= DISPLAY TABLE ================= */

function displayTable(){

let start = (currentPage - 1) * rowsPerPage;
let end = start + rowsPerPage;

let html = "";

if(filteredData.length === 0){

html = `
<tr>

<td colspan="2">

<div class="empty-state">
❌ No Subject Found
</div>

</td>

</tr>
`;

}

else{

filteredData.slice(start,end).forEach(item=>{

/* ================= FILE NAME FORMAT ================= */

let fileName = item.link
.split("/")
.pop()
.replace(".pdf","")
.replace(/-/g," ")
.replace(/\b\w/g,char => char.toUpperCase());

/* ================= TABLE ROW ================= */

html += `

<tr>

<td>

<div style="
font-weight:600;
color:#0f172a;
line-height:1.7;
">

📘 ${fileName}

</div>

</td>

<td>

<a href="${item.link}"
target="_blank"
class="download-btn">

<i class="bi bi-file-earmark-pdf-fill"></i>
Download

</a>

</td>

</tr>

`;

});

}

document.getElementById("tableData").innerHTML = html;

setupPagination();

}

/* ================= PAGINATION ================= */

function setupPagination(){

let pageCount =
Math.ceil(filteredData.length / rowsPerPage);

let buttons = "";

for(let i=1;i<=pageCount;i++){

buttons += `

<button
onclick="changePage(${i})"
class="${i===currentPage ? "active" : ""}">

${i}

</button>

`;

}

document.getElementById("pagination").innerHTML = buttons;

}

function changePage(page){

currentPage = page;
displayTable();

}

/* ================= SEARCH ================= */

document.getElementById("search")
.addEventListener("keyup",function(){

let value = this.value.toLowerCase();

filteredData = fullData.filter(item =>

item.link
.toLowerCase()
.includes(value)

);

currentPage = 1;

displayTable();

});

/* ================= INIT ================= */

displayTable();

</script>
