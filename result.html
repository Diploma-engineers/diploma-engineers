<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Result | Diploma Engineers</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
    overflow-x:hidden;
}

/* =====================================================
HEADER FIX
===================================================== */

#header{
    width:100%;
    position:relative;
    z-index:99999;
}

/* =====================================================
MAIN SECTION
===================================================== */

.main-section{

    padding:135px 15px 60px;

}

/* =====================================================
RESULT CARD
===================================================== */

.result-card{

    max-width:460px;

    margin:auto;

    background:white;

    border-radius:30px;

    padding:38px 30px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,0.08);

    position:relative;

    overflow:hidden;

}

.result-card::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:5px;

    background:linear-gradient(90deg,#22c55e,#2563eb,#ff9800);

}

/* =====================================================
ICON
===================================================== */

.result-icon{

    width:95px;

    height:95px;

    margin:auto;

    border-radius:25px;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    display:flex;

    align-items:center;

    justify-content:center;

    color:white;

    font-size:38px;

    box-shadow:0 10px 25px rgba(37,99,235,0.25);

    margin-bottom:22px;

}

/* =====================================================
TEXT
===================================================== */

.result-card h1{

    font-size:34px;

    font-weight:700;

    color:#0d1b2a;

    margin-bottom:12px;

}

.result-card p{

    color:#64748b;

    font-size:15px;

    line-height:1.7;

}

/* =====================================================
BUTTONS
===================================================== */

.result-btn{

    width:100%;

    border:none;

    padding:16px;

    border-radius:18px;

    margin-top:18px;

    color:white;

    font-size:16px;

    font-weight:600;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    transition:0.3s;

    cursor:pointer;

}

.main-btn{

    background:linear-gradient(135deg,#22c55e,#16a34a);

    box-shadow:0 10px 25px rgba(34,197,94,0.25);

}

.main-btn:hover{

    transform:translateY(-4px);

}

.reval-btn{

    background:linear-gradient(135deg,#0ea5e9,#0284c7);

    box-shadow:0 10px 25px rgba(14,165,233,0.25);

}

.reval-btn:hover{

    transform:translateY(-4px);

}

/* =====================================================
INFO BOX
===================================================== */

.info-box{

    margin-top:22px;

    background:#f8fafc;

    padding:14px;

    border-radius:16px;

    font-size:13px;

    color:#64748b;

    line-height:1.8;

}

/* =====================================================
FOOTER SPACE
===================================================== */

#footer{

    margin-top:50px;

}

/* =====================================================
MOBILE
===================================================== */

@media(max-width:768px){

    .main-section{

        padding:120px 12px 50px;

    }

    .result-card{

        padding:30px 20px;

        border-radius:24px;

    }

    .result-card h1{

        font-size:28px;

    }

    .result-icon{

        width:80px;

        height:80px;

        font-size:32px;

    }

}

</style>

</head>

<body>

<!-- =====================================================
HEADER
===================================================== -->

<div id="header"></div>

<script>

fetch("header.html")
.then(response => response.text())
.then(data => {

document.getElementById("header").innerHTML = data;

/* NAV FIX */

setTimeout(() => {

const toggler = document.querySelector(".navbar-toggler");
const menu = document.querySelector("#menu");

if(toggler && menu){

toggler.addEventListener("click", () => {

menu.classList.toggle("show");

});

}

},500);

});

</script>

<!-- =====================================================
MAIN SECTION
===================================================== -->

<div class="container main-section">

<div class="result-card">

<div class="result-icon">

<i class="fa-solid fa-square-poll-vertical"></i>

</div>

<h1>BTEUP Result</h1>

<p>

Check your Diploma Engineering Result and Revaluation Result quickly from one place.

</p>

<button class="result-btn main-btn" onclick="goMain()">

<i class="fa-solid fa-file-lines"></i>

Main Result

</button>

<button class="result-btn reval-btn" onclick="goReval()">

<i class="fa-solid fa-rotate"></i>

Revaluation Result

</button>

<div class="info-box">

📢 Make sure your Enrollment Number is correct before checking result.

</div>

</div>

</div>

<!-- =====================================================
FOOTER
===================================================== -->

<div id="footer"></div>

<script>

fetch("footer.html")
.then(response => response.text())
.then(data => {

document.getElementById("footer").innerHTML = data;

});

</script>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- =====================================================
JS
===================================================== -->

<script>

function goMain(){

window.location.href = "main-result.html";

}

function goReval(){

window.location.href = "reval-result.html";

}

</script>

</body>
</html>
