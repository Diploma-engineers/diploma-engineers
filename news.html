<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTEUP News</title>
</head>
<body>

    <!-- Header -->
    <div id="header"></div>

    <!-- Main Content -->
    <main class="container">

        <div class="card post">

            <h2>BTEUP Important Notice</h2>

            <iframe
                src="https://drive.google.com/file/d/1PmaHeksLqxufO11VC5ryCVjV5FP3r9Ej/preview"
                width="100%"
                height="300"
                style="border:none;border-radius:10px;">
            </iframe>

            <p>
                BTEUP के छात्रों के लिए महत्वपूर्ण सूचना जारी की गई है।
                पूरी जानकारी के लिए नीचे दिए गए बटन पर क्लिक करें।
            </p>

            <a href="https://drive.google.com/file/d/1PmaHeksLqxufO11VC5ryCVjV5FP3r9Ej/view?usp=drivesdk"
               target="_blank">
               View Full Document
            </a>

        </div>

    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script>
        fetch("header.html")
            .then(res => res.text())
            .then(data => document.getElementById("header").innerHTML = data);

        fetch("footer.html")
            .then(res => res.text())
            .then(data => document.getElementById("footer").innerHTML = data);
    </script>

</body>
</html>
