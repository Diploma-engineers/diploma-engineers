<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diploma Engineers</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    padding-top:80px;
    background:#f4f7fb;
}

/* CARD */
.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    max-width:400px;
    margin:60px auto;
    border:1px solid #ddd;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* BUTTON */
.option{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.main-btn{
    background:#22c55e;
    color:white;
}

.main-btn:hover{
    background:#16a34a;
    transform:translateY(-2px);
}

.reval-btn{
    background:#0ea5e9;
    color:white;
}

.reval-btn:hover{
    background:#0284c7;
    transform:translateY(-2px);
}

</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {
document.getElementById("header").innerHTML = data;
});
</script>

<!-- MAIN -->
<div class="container">

<div class="card">

<h2>Select Result Type</h2>

<p style="color:#666;">
Choose which result you want to check
</p>

<button class="option main-btn" onclick="goMain()">
📄 Main Result
</button>

<button class="option reval-btn" onclick="goReval()">
🔁 Revaluation Result
</button>

</div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});
</script>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- RESULT REDIRECT -->
<script>

function goMain(){
window.location.href="main-result.html";
}

function goReval(){
window.location.href="reval-result.html";
}

</script>

</body>
</html>
