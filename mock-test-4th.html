<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JEECUP CBT Mock Test</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f1f1;
}

/* LOGIN */

#loginPage{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#dfe9f3;
}

.loginBox{
width:400px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.loginBox h1{
text-align:center;
margin-bottom:20px;
color:#003366;
}

.loginBox input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

.loginBox button{
width:100%;
padding:12px;
margin-top:20px;
background:#003366;
color:white;
border:none;
cursor:pointer;
font-size:18px;
border-radius:5px;
}

/* EXAM PAGE */

#examPage{
display:none;
}

.topbar{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.infoBar{
background:white;
padding:10px;
display:flex;
justify-content:space-between;
font-weight:bold;
border-bottom:1px solid #ccc;
}

.container{
display:flex;
gap:10px;
padding:10px;
}

.left{
width:75%;
background:white;
border:1px solid #ccc;
}

.right{
width:25%;
background:white;
border:1px solid #ccc;
padding:10px;
}

.subjects{
display:flex;
gap:5px;
padding:10px;
background:#eee;
}

.subjects button{
padding:10px 15px;
border:none;
cursor:pointer;
background:#999;
color:white;
font-weight:bold;
}

.subjects .active{
background:#d9534f;
}

.questionBox{
padding:20px;
min-height:300px;
}

#qNo{
margin-bottom:10px;
color:#003366;
}

.option{
display:block;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
cursor:pointer;
}

.footerBtns{
padding:15px;
text-align:center;
border-top:1px solid #ccc;
}

.footerBtns button{
padding:10px 15px;
margin:5px;
border:none;
cursor:pointer;
color:white;
font-weight:bold;
border-radius:5px;
}

.prevBtn{
background:#d9534f;
}

.reviewBtn{
background:#f0ad4e;
}

.clearBtn{
background:#777;
}

.nextBtn{
background:#5cb85c;
}

.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:10px;
max-height:400px;
overflow:auto;
}

.paletteBtn{
height:40px;
border:none;
font-weight:bold;
cursor:pointer;
background:#eee;
}

.green{
background:#5cb85c !important;
color:white;
}

.red{
background:#d9534f !important;
color:white;
}

.yellow{
background:#ffc107 !important;
}

.current{
border:3px solid black;
}

/* RESULT */

#resultPage{
display:none;
padding:20px;
}

.resultCard{
background:white;
padding:20px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th,table td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

.reviewBox{
border:1px solid #ccc;
padding:15px;
margin-top:15px;
background:white;
}

.downloadBtn{
padding:12px 20px;
background:#003366;
color:white;
border:none;
cursor:pointer;
margin-top:20px;
font-size:16px;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.left,.right{
width:100%;
}

}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h1>JEECUP CBT LOGIN</h1>

<input type="text" id="studentName" placeholder="Enter Full Name">

<input type="text" id="studentMobile" placeholder="Enter Mobile Number">

<input type="text" id="studentRoll" placeholder="Enter Roll Number">

<button onclick="startExam()">
START TEST
</button>

</div>

</div>

<!-- EXAM PAGE -->

<div id="examPage">

<div class="topbar">

<h1>TOPPERSEXAM CBT MOCK TEST</h1>

</div>

<div class="infoBar">

<div>
Student : <span id="studentShow"></span>
</div>

<div>
Time Left :
<span id="timer">01:00:00</span>
</div>

</div>

<div class="container">

<div class="left">

<div class="subjects">

<button id="mathBtn" class="active">
MATHEMATICS
</button>

<button id="phyBtn">
PHYSICS
</button>

<button id="chemBtn">
CHEMISTRY
</button>

</div>

<div class="questionBox">

<h3 id="qNo"></h3>

<h2 id="question"></h2>

<div id="options"></div>

</div>

<div class="footerBtns">

<button class="prevBtn" onclick="prevQuestion()">
SAVE & PREV
</button>

<button class="reviewBtn" onclick="markReview()">
MARK FOR REVIEW
</button>

<button class="clearBtn" onclick="clearResponse()">
CLEAR RESPONSE
</button>

<button class="nextBtn" onclick="saveNext()">
SAVE & NEXT
</button>

</div>

</div>

<div class="right">

<h3>Question Palette</h3>

<div class="palette" id="palette"></div>

<br>

<p>
<span style="background:#5cb85c;padding:5px 10px"></span>
 Answered
</p>

<br>

<p>
<span style="background:#d9534f;padding:5px 10px"></span>
 Not Answered
</p>

<br>

<p>
<span style="background:#ffc107;padding:5px 10px"></span>
 Marked
</p>

<br>

<button class="downloadBtn" onclick="submitTest()">
SUBMIT TEST
</button>

</div>

</div>

</div>

<!-- RESULT -->

<div id="resultPage">

<div class="resultCard">

<h1 style="text-align:center;color:#003366">
FINAL RESULT
</h1>

<h2 style="margin-top:20px">
Student Name :
<span id="rName"></span>
</h2>

<h2>
Mobile :
<span id="rMobile"></span>
</h2>

<h2>
Roll :
<span id="rRoll"></span>
</h2>

<table>

<tr>

<th>Subject</th>
<th>Total</th>
<th>Attempted</th>
<th>Correct</th>
<th>Wrong</th>
<th>Marks</th>
<th>Percentage</th>

</tr>

<tr>

<td>Mathematics</td>
<td id="mathTotal"></td>
<td id="mathAttempt"></td>
<td id="mathCorrect"></td>
<td id="mathWrong"></td>
<td id="mathMarks"></td>
<td id="mathPercent"></td>

</tr>

<tr>

<td>Physics</td>
<td id="phyTotal"></td>
<td id="phyAttempt"></td>
<td id="phyCorrect"></td>
<td id="phyWrong"></td>
<td id="phyMarks"></td>
<td id="phyPercent"></td>

</tr>

<tr>

<td>Chemistry</td>
<td id="chemTotal"></td>
<td id="chemAttempt"></td>
<td id="chemCorrect"></td>
<td id="chemWrong"></td>
<td id="chemMarks"></td>
<td id="chemPercent"></td>

</tr>

<tr style="background:#003366;color:white">

<td>Overall</td>
<td id="overallTotal"></td>
<td id="overallAttempt"></td>
<td id="overallCorrect"></td>
<td id="overallWrong"></td>
<td id="overallMarks"></td>
<td id="overallPercent"></td>

</tr>

</table>

<button class="downloadBtn" onclick="window.print()">
DOWNLOAD PDF
</button>

</div>

<div id="answerReview"></div>

</div>

<script>

/* ======================
   QUESTIONS
====================== */

let questions = [

{
q:"2 + 2 = ?",
opt:["2","3","4","5"],
ans:2,
subject:"math"
},

{
q:"5 × 5 = ?",
opt:["10","20","25","30"],
ans:2,
subject:"math"
},

{
q:"sin 90° = ?",
opt:["0","1","2","3"],
ans:1,
subject:"math"
},

{
q:"बल = ?",
opt:["m/a","m×a","a/m","none"],
ans:1,
subject:"physics"
},

{
q:"SI unit of current?",
opt:["Volt","Ampere","Ohm","Watt"],
ans:1,
subject:"physics"
},

{
q:"Speed of light?",
opt:["3×10⁸","5×10⁸","2×10⁸","1×10⁸"],
ans:0,
subject:"physics"
},

{
q:"Water formula?",
opt:["H2O","CO2","O2","NaCl"],
ans:0,
subject:"chemistry"
},

{
q:"pH less than 7 means?",
opt:["Acid","Base","Neutral","Salt"],
ans:0,
subject:"chemistry"
},

{
q:"Sodium symbol?",
opt:["S","So","Na","N"],
ans:2,
subject:"chemistry"
}

];

/* ======================
   VARIABLES
====================== */

let current=0;

let answers=new Array(questions.length).fill(null);

let marked=new Array(questions.length).fill(false);

let visited=new Array(questions.length).fill(false);

let totalTime=3600;

let timer;

/* ======================
   START EXAM
====================== */

function startExam(){

let name=document.getElementById("studentName").value;

let mobile=document.getElementById("studentMobile").value;

let roll=document.getElementById("studentRoll").value;

if(name==="" || mobile==="" || roll===""){

alert("Please Fill All Details");

return;

}

localStorage.setItem("name",name);

localStorage.setItem("mobile",mobile);

localStorage.setItem("roll",roll);

document.getElementById("loginPage").style.display="none";

document.getElementById("examPage").style.display="block";

document.getElementById("studentShow").innerHTML=name;

createPalette();

loadQuestion();

startTimer();

}

/* ======================
   TIMER
====================== */

function startTimer(){

timer=setInterval(()=>{

let hr=Math.floor(totalTime/3600);

let min=Math.floor((totalTime%3600)/60);

let sec=totalTime%60;

document.getElementById("timer").innerHTML=

`${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

totalTime--;

if(totalTime<0){

clearInterval(timer);

submitTest();

}

},1000);

}

/* ======================
   LOAD QUESTION
====================== */

function loadQuestion(){

visited[current]=true;

let q=questions[current];

document.getElementById("qNo").innerHTML=

`Question No. ${current+1}`;

document.getElementById("question").innerHTML=q.q;

let html="";

q.opt.forEach((o,index)=>{

html+=`

<label class="option">

<input type="radio"
name="option"
value="${index}"
${answers[current]===index?"checked":""}>

${o}

</label>

`;

});

document.getElementById("options").innerHTML=html;

updatePalette();

updateSubjectButton();

}

/* ======================
   SUBJECT BUTTON
====================== */

function updateSubjectButton(){

document.getElementById("mathBtn").classList.remove("active");

document.getElementById("phyBtn").classList.remove("active");

document.getElementById("chemBtn").classList.remove("active");

let sub=questions[current].subject;

if(sub==="math"){

document.getElementById("mathBtn").classList.add("active");

}

if(sub==="physics"){

document.getElementById("phyBtn").classList.add("active");

}

if(sub==="chemistry"){

document.getElementById("chemBtn").classList.add("active");

}

}

/* ======================
   SAVE ANSWER
====================== */

function saveAnswer(){

let selected=document.querySelector('input[name="option"]:checked');

if(selected){

answers[current]=Number(selected.value);

}

}

/* ======================
   NEXT
====================== */

function saveNext(){

saveAnswer();

if(current<questions.length-1){

current++;

loadQuestion();

}

}

/* ======================
   PREV
====================== */

function prevQuestion(){

saveAnswer();

if(current>0){

current--;

loadQuestion();

}

}

/* ======================
   MARK REVIEW
====================== */

function markReview(){

saveAnswer();

marked[current]=true;

updatePalette();

if(current<questions.length-1){

current++;

loadQuestion();

}

}

/* ======================
   CLEAR
====================== */

function clearResponse(){

answers[current]=null;

marked[current]=false;

loadQuestion();

}

/* ======================
   PALETTE
====================== */

function createPalette(){

let html="";

for(let i=0;i<questions.length;i++){

html+=`

<button
id="pal${i}"
class="paletteBtn"
onclick="jumpQuestion(${i})">

${i+1}

</button>

`;

}

document.getElementById("palette").innerHTML=html;

updatePalette();

}

/* ======================
   UPDATE PALETTE
====================== */

function updatePalette(){

for(let i=0;i<questions.length;i++){

let btn=document.getElementById(`pal${i}`);

btn.classList.remove(
"green",
"red",
"yellow",
"current"
);

if(answers[i]!==null){

btn.classList.add("green");

}

if(visited[i] && answers[i]===null){

btn.classList.add("red");

}

if(marked[i]){

btn.classList.remove("green");

btn.classList.add("yellow");

}

if(i===current){

btn.classList.add("current");

}

}

}

/* ======================
   JUMP
====================== */

function jumpQuestion(i){

saveAnswer();

current=i;

loadQuestion();

}

/* ======================
   RESULT
====================== */

function calculateSection(subject){

let total=0;

let attempt=0;

let correct=0;

let wrong=0;

questions.forEach((q,index)=>{

if(q.subject===subject){

total++;

if(answers[index]!==null){

attempt++;

if(answers[index]===q.ans){

correct++;

}else{

wrong++;

}

}

}

});

let marks=(correct*4)-(wrong);

if(marks<0){

marks=0;

}

let percent=((marks/(total*4))*100).toFixed(2);

return {

total,
attempt,
correct,
wrong,
marks,
percent

};

}

/* ======================
   SUBMIT
====================== */

function submitTest(){

clearInterval(timer);

saveAnswer();

document.getElementById("examPage").style.display="none";

document.getElementById("resultPage").style.display="block";

document.getElementById("rName").innerHTML=
localStorage.getItem("name");

document.getElementById("rMobile").innerHTML=
localStorage.getItem("mobile");

document.getElementById("rRoll").innerHTML=
localStorage.getItem("roll");

/* MATH */

let math=calculateSection("math");

document.getElementById("mathTotal").innerHTML=math.total;

document.getElementById("mathAttempt").innerHTML=math.attempt;

document.getElementById("mathCorrect").innerHTML=math.correct;

document.getElementById("mathWrong").innerHTML=math.wrong;

document.getElementById("mathMarks").innerHTML=math.marks;

document.getElementById("mathPercent").innerHTML=
math.percent+"%";

/* PHYSICS */

let phy=calculateSection("physics");

document.getElementById("phyTotal").innerHTML=phy.total;

document.getElementById("phyAttempt").innerHTML=phy.attempt;

document.getElementById("phyCorrect").innerHTML=phy.correct;

document.getElementById("phyWrong").innerHTML=phy.wrong;

document.getElementById("phyMarks").innerHTML=phy.marks;

document.getElementById("phyPercent").innerHTML=
phy.percent+"%";

/* CHEMISTRY */

let chem=calculateSection("chemistry");

document.getElementById("chemTotal").innerHTML=chem.total;

document.getElementById("chemAttempt").innerHTML=chem.attempt;

document.getElementById("chemCorrect").innerHTML=chem.correct;

document.getElementById("chemWrong").innerHTML=chem.wrong;

document.getElementById("chemMarks").innerHTML=chem.marks;

document.getElementById("chemPercent").innerHTML=
chem.percent+"%";

/* OVERALL */

let totalQ=questions.length;

let totalAttempt=
math.attempt+
phy.attempt+
chem.attempt;

let totalCorrect=
math.correct+
phy.correct+
chem.correct;

let totalWrong=
math.wrong+
phy.wrong+
chem.wrong;

let totalMarks=
math.marks+
phy.marks+
chem.marks;

let totalPercent=
((totalMarks/(totalQ*4))*100).toFixed(2);

document.getElementById("overallTotal").innerHTML=
totalQ;

document.getElementById("overallAttempt").innerHTML=
totalAttempt;

document.getElementById("overallCorrect").innerHTML=
totalCorrect;

document.getElementById("overallWrong").innerHTML=
totalWrong;

document.getElementById("overallMarks").innerHTML=
totalMarks;

document.getElementById("overallPercent").innerHTML=
totalPercent+"%";

showAnswers();

}

/* ======================
   ANSWERS REVIEW
====================== */

function showAnswers(){

let html="";

questions.forEach((q,index)=>{

let userAns=
answers[index]!==null
? q.opt[answers[index]]
: "Not Answered";

let correctAns=q.opt[q.ans];

let status="";

if(answers[index]===null){

status="<span style='color:red'>NOT ANSWERED</span>";

}else if(answers[index]===q.ans){

status="<span style='color:green'>CORRECT</span>";

}else{

status="<span style='color:red'>WRONG</span>";

}

html+=`

<div class="reviewBox">

<h3>
Question ${index+1}
</h3>

<p>
<b>Subject :</b>
${q.subject.toUpperCase()}
</p>

<p>
<b>Question :</b>
${q.q}
</p>

<p>
<b>Your Answer :</b>
${userAns}
</p>

<p>
<b>Correct Answer :</b>
${correctAns}
</p>

<p>
<b>Status :</b>
${status}
</p>

</div>

`;

});

document.getElementById("answerReview").innerHTML=html;

}

</script>

</body>
</html>
