<!-- FLOATING FEEDBACK BUTTON -->
<div class="feedback-btn" onclick="toggleFeedback()">
    <i class="fas fa-comment-dots"></i>
</div>

<!-- FEEDBACK POPUP -->
<div class="feedback-popup" id="feedbackBox">

<span class="close-btn" onclick="toggleFeedback()">&times;</span>

<h5 style="margin-bottom:15px;">Feedback</h5>

<form action="https://formsubmit.co/astar22072006@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Email" required>

<select name="rating" required>
<option value="">Rate</option>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>

<textarea name="message" rows="3" placeholder="Feedback" required></textarea>

<button type="submit">Send</button>

</form>

</div>
