<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#ff6b00;
--bg:#f6f8ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--bg);
}

/* AUTH */
#authPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6b00,#ff944d);
padding:20px;
}

.auth-box{
background:white;
padding:20px;
border-radius:18px;
width:100%;
max-width:380px;
}

.auth-box h2{
text-align:center;
margin-bottom:15px;
}

.auth-box input, .auth-box select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
}

.btn-main{
width:100%;
padding:12px;
background:var(--primary);
color:white;
border:none;
border-radius:10px;
font-weight:600;
margin-top:10px;
}

.switch{
text-align:center;
margin-top:10px;
font-size:13px;
color:var(--primary);
cursor:pointer;
}

/* APP */
#app{
display:none;
}

/* NAVBAR */
.navbar{
background:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.logo{
font-weight:700;
}

.logo span{
color:var(--primary);
}

/* HERO */
.hero{
padding:15px;
}

.banner{
background:linear-gradient(135deg,var(--primary),#ff944d);
color:white;
padding:20px;
border-radius:18px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:none;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -5px 20px rgba(0,0,0,0.08);
}

.bottom-nav a{
text-decoration:none;
color:#777;
font-size:12px;
text-align:center;
}

.bottom-nav i{
display:block;
font-size:18px;
}

.bottom-nav a.active{
color:var(--primary);
}

</style>
</head>

<body>

<!-- AUTH -->
<div id="authPage">

<div class="auth-box">

<h2 id="title">Login</h2>

<!-- LOGIN -->
<input type="text" id="mobile" placeholder="Mobile Number">
<input type="password" id="pass" placeholder="Password">

<!-- REGISTER -->
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email ID">

<select id="branch">
<option value="">Select Branch</option>
<option>Civil Engineering</option>
<option>Mechanical Engineering</option>
<option>Electrical Engineering</option>
<option>Computer Science</option>
<option>IT</option>
</select>

<button class="btn-main" onclick="submitAuth()">Submit</button>

<div class="switch" onclick="toggleForm()">
<span id="switchText">New user? Register here</span>
</div>

</div>

</div>

<!-- APP -->
<div id="app">

<!-- NAV -->
<div class="navbar">
<div class="logo">Diploma <span>Engineers</span></div>
<div><i class="fas fa-user-circle fa-lg"></i></div>
</div>

<!-- HOME -->
<section class="hero">
<div class="banner">
<h3>Welcome, <span id="userName">User</span></h3>
<p>Notes • PYQ • E-Books • Study Material</p>
</div>
</section>

<section class="section">
<div class="grid">

<div class="card">
<a href="notes.html">
<i class="fas fa-book"></i>
<p>Notes</p>
</a>
</div>

<div class="card">
<a href="Books.html">
<i class="fas fa-file-pdf"></i>
<p>E-Books</p>
</a>
</div>

<div class="card">
<a href="P.Y.Q.html">
<i class="fas fa-layer-group"></i>
<p>PYQ</p>
</a>
</div>

<div class="card">
<i class="fas fa-bell"></i>
<p>Updates</p>
</div>

</div>
</section>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav">

<a href="#" class="active">
<i class="fas fa-home"></i>Home
</a>

<a href="notes.html">
<i class="fas fa-book"></i>Notes
</a>

<a href="Books.html">
<i class="fas fa-file-pdf"></i>E-Books
</a>

<a href="P.Y.Q.html">
<i class="fas fa-layer-group"></i>PYQ
</a>

<a href="#">
<i class="fas fa-user"></i>Profile
</a>

</div>

<script>

let isLogin = true;

// TOGGLE
function toggleForm(){
isLogin = !isLogin;

document.getElementById("title").innerText = isLogin ? "Login" : "Register";
document.getElementById("switchText").innerText = isLogin ? "New user? Register here" : "Already have account? Login";
}

// SUBMIT AUTH
function submitAuth(){

let mobile = document.getElementById("mobile").value;
let pass = document.getElementById("pass").value;
let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let branch = document.getElementById("branch").value;

// REGISTER
if(!isLogin){

if(mobile=="" || pass=="" || name=="" || email=="" || branch==""){
alert("Fill all fields");
return;
}

let userData = {
name:name,
pass:pass,
email:email,
branch:branch
};

localStorage.setItem(mobile, JSON.stringify(userData));

alert("Registration Successful!");
toggleForm();
return;
}

// LOGIN
let data = localStorage.getItem(mobile);

if(data){

let obj = JSON.parse(data);

if(obj.pass === pass){

localStorage.setItem("currentUser", mobile);

document.getElementById("authPage").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("bottomNav").style.display="flex";

document.getElementById("userName").innerText = obj.name;

}else{
alert("Wrong Password");
}

}else{
alert("User not found");
}

}

// AUTO LOGIN
window.onload=function(){

let user = localStorage.getItem("currentUser");

if(user){

let obj = JSON.parse(localStorage.getItem(user));

document.getElementById("authPage").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("bottomNav").style.display="flex";

document.getElementById("userName").innerText = obj.name;
}

}

</script>

</body>
</html>
