<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Diploma Engineers</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
    padding-top:80px;
    color:#0f172a;
}

/* =====================================================
MAIN SECTION
===================================================== */

.contact-section{

    min-height:100vh;

    padding:40px 15px 60px;

}

/* =====================================================
CONTACT CARD
===================================================== */

.contact-card{

    max-width:580px;

    margin:auto;

    background:#ffffff;

    border-radius:30px;

    padding:40px 30px;

    position:relative;

    overflow:hidden;

    box-shadow:0 15px 40px rgba(0,0,0,0.08);

}

.contact-card::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:6px;

    background:linear-gradient(90deg,#ff9800,#ff5722,#2563eb);

}

/* =====================================================
ICON
===================================================== */

.icon-box{

    width:100px;
    height:100px;

    margin:auto;

    border-radius:28px;

    background:linear-gradient(135deg,#ff9800,#ff5722);

    display:flex;

    align-items:center;
    justify-content:center;

    color:white;

    font-size:40px;

    box-shadow:0 12px 30px rgba(255,152,0,0.25);

    margin-bottom:25px;

}

/* =====================================================
TITLE
===================================================== */

.contact-card h2{

    text-align:center;

    font-size:34px;

    font-weight:700;

    color:#0d1b2a;

    margin-bottom:10px;

}

.contact-card p{

    text-align:center;

    color:#64748b;

    font-size:15px;

    line-height:1.8;

}

/* =====================================================
INPUTS
===================================================== */

.input-box{

    margin-top:22px;

}

.input-box label{

    display:block;

    margin-bottom:10px;

    font-size:14px;

    font-weight:600;

    color:#334155;

}

.input-box input,
.input-box textarea{

    width:100%;

    padding:16px 18px;

    border-radius:16px;

    border:1px solid #cbd5e1;

    outline:none;

    font-size:15px;

    transition:0.3s;

    background:#f8fafc;

    resize:none;

}

.input-box input:focus,
.input-box textarea:focus{

    border-color:#2563eb;

    background:white;

    box-shadow:0 0 0 4px rgba(37,99,235,0.12);

}

/* =====================================================
BUTTON
===================================================== */

.btn-send{

    width:100%;

    margin-top:28px;

    padding:16px;

    border:none;

    border-radius:16px;

    background:linear-gradient(135deg,#ff9800,#ff5722);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    box-shadow:0 12px 25px rgba(255,152,0,0.25);

}

.btn-send:hover{

    transform:translateY(-3px);

    box-shadow:0 18px 35px rgba(255,152,0,0.35);

}

/* =====================================================
INFO BOX
===================================================== */

.info-box{

    margin-top:25px;

    background:#eff6ff;

    border:1px solid #bfdbfe;

    padding:16px;

    border-radius:16px;

    font-size:14px;

    color:#1d4ed8;

    line-height:1.8;

    text-align:center;

}

/* =====================================================
CONTACT EXTRA
===================================================== */

.contact-extra{

    margin-top:22px;

    display:flex;

    flex-direction:column;

    gap:12px;

}

.contact-item{

    background:#f8fafc;

    border-radius:14px;

    padding:14px 16px;

    display:flex;

    align-items:center;

    gap:14px;

    color:#334155;

    font-size:14px;

}

.contact-item i{

    width:42px;
    height:42px;

    border-radius:12px;

    background:#eff6ff;

    color:#2563eb;

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:18px;

}

/* =====================================================
MOBILE
===================================================== */

@media(max-width:768px){

    .contact-section{

        padding:25px 12px 50px;

    }

    .contact-card{

        padding:32px 20px;

        border-radius:24px;

    }

    .icon-box{

        width:85px;
        height:85px;

        font-size:34px;

    }

    .contact-card h2{

        font-size:28px;

    }

    .btn-send{

        font-size:15px;

    }

}

</style>

</head>

<body>

<!-- =====================================================
HEADER
===================================================== -->

<div id="header"></div>

<!-- =====================================================
MAIN
===================================================== -->

<section class="contact-section">

<div class="contact-card">

<div class="icon-box">
<i class="fa-solid fa-envelope-open-text"></i>
</div>

<h2>Contact Us</h2>

<p>

Have questions, suggestions or feedback?  
We are always ready to help Diploma Engineering students.

</p>

<form action="https://formsubmit.co/astar22072006@gmail.com"
method="POST">

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_template" value="table">

<div class="input-box">

<label>Your Name</label>

<input type="text"
name="name"
placeholder="Enter Your Name"
required>

</div>

<div class="input-box">

<label>Email Address</label>

<input type="email"
name="email"
placeholder="Enter Your Email"
required>

</div>

<div class="input-box">

<label>Your Message</label>

<textarea rows="5"
name="message"
placeholder="Write your message here..."
required></textarea>

</div>

<button type="submit" class="btn-send">

<i class="fa-solid fa-paper-plane"></i>

Send Message

</button>

</form>

<div class="contact-extra">

<div class="contact-item">

<i class="fa-brands fa-telegram"></i>

<span>Telegram: @diploma_engineers7</span>

</div>

<div class="contact-item">

<i class="fa-solid fa-graduation-cap"></i>

<span>Diploma Engineers Student Community</span>

</div>

</div>

<div class="info-box">

⚡ We usually reply within 24 hours.

</div>

</div>

</section>

<!-- =====================================================
FOOTER
===================================================== -->

<div id="footer"></div>

<!-- =====================================================
HEADER / FOOTER LOAD
===================================================== -->

<script>

fetch("header.html")
.then(res => res.text())
.then(data => {

document.getElementById("header").innerHTML = data;

});

fetch("footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data;

});

</script>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
