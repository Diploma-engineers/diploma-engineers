<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JEECUP CBT Mock Test</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f1f1;
}

/* LOGIN */

#loginPage{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#dfe9f3;
padding:15px;
}

.loginBox{
width:100%;
max-width:400px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.loginBox h1{
text-align:center;
margin-bottom:20px;
color:#003366;
font-size:28px;
}

.loginBox input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

.loginBox button{
width:100%;
padding:12px;
margin-top:20px;
background:#003366;
color:white;
border:none;
cursor:pointer;
font-size:18px;
border-radius:5px;
}

/* EXAM PAGE */

#examPage{
display:none;
}

.topbar{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.infoBar{
background:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
border-bottom:1px solid #ccc;
flex-wrap:wrap;
gap:10px;
}

.container{
display:flex;
gap:10px;
padding:10px;
}

.left{
width:75%;
background:white;
border:1px solid #ccc;
}

.right{
width:25%;
background:white;
border:1px solid #ccc;
padding:10px;
}

.subjects{
display:flex;
gap:5px;
padding:10px;
background:#eee;
flex-wrap:wrap;
}

.subjects button{
padding:10px 15px;
border:none;
cursor:pointer;
background:#999;
color:white;
font-weight:bold;
border-radius:5px;
}

.subjects .active{
background:#d9534f;
}

.questionBox{
padding:20px;
min-height:350px;
}

#qNo{
margin-bottom:10px;
color:#003366;
font-size:20px;
}

#question{
font-size:24px;
line-height:1.5;
margin-top:10px;
}

.option{
display:flex;
align-items:flex-start;
gap:10px;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:5px;
cursor:pointer;
font-size:18px;
}

.option input{
margin-top:4px;
transform:scale(1.2);
}

.footerBtns{
padding:15px;
text-align:center;
border-top:1px solid #ccc;
}

.footerBtns button{
padding:10px 15px;
margin:5px;
border:none;
cursor:pointer;
color:white;
font-weight:bold;
border-radius:5px;
font-size:15px;
}

.prevBtn{
background:#d9534f;
}

.reviewBtn{
background:#f0ad4e;
}

.clearBtn{
background:#777;
}

.nextBtn{
background:#5cb85c;
}

.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:10px;
max-height:400px;
overflow:auto;
}

.paletteBtn{
height:42px;
border:none;
font-weight:bold;
cursor:pointer;
background:#eee;
border-radius:5px;
}

.green{
background:#5cb85c !important;
color:white;
}

.red{
background:#d9534f !important;
color:white;
}

.yellow{
background:#ffc107 !important;
color:black;
}

.current{
border:3px solid black !important;
}

/* RESULT */

#resultPage{
display:none;
padding:20px;
}

.resultCard{
background:white;
padding:20px;
border:1px solid #ccc;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th,
table td{
border:1px solid #ccc;
padding:10px;
text-align:center;
font-size:15px;
}

.reviewBox{
border:1px solid #ccc;
padding:15px;
margin-top:15px;
background:white;
border-radius:8px;
}

.downloadBtn{
padding:12px 20px;
background:#003366;
color:white;
border:none;
cursor:pointer;
margin-top:20px;
font-size:16px;
border-radius:5px;
margin-right:10px;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.left,
.right{
width:100%;
}

#question{
font-size:20px;
}

.option{
font-size:16px;
}

table{
font-size:12px;
overflow:auto;
display:block;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h1>JEECUP CBT LOGIN</h1>

<input type="text" id="studentName" placeholder="Enter Full Name">

<input type="email" id="studentEmail" placeholder="Enter Valid Email ID">

<input type="text" id="studentMobile" placeholder="Enter Valid Mobile Number">


<button onclick="startExam()">
START TEST
</button>

</div>

</div>

<!-- EXAM PAGE -->

<div id="examPage">

<div class="topbar">
<h1>DIPLOMA ENGINEERS CBT MOCK TEST </h1>
</div>

<div class="infoBar">

<div>
Student :
<span id="studentShow"></span>
</div>

<div>
Time Left :
<span id="timer">02:30:00</span>
</div>

</div>

<div class="container">

<div class="left">

<div class="subjects">

<button id="mathBtn" class="active">
MATHEMATICS
</button>

<button id="phyBtn">
PHYSICS
</button>

<button id="chemBtn">
CHEMISTRY
</button>

</div>

<div class="questionBox">

<h3 id="qNo"></h3>

<h2 id="question"></h2>

<div id="options"></div>

</div>

<div class="footerBtns">

<button class="prevBtn" onclick="prevQuestion()">
SAVE & PREV
</button>

<button class="reviewBtn" onclick="markReview()">
MARK FOR REVIEW
</button>

<button class="clearBtn" onclick="clearResponse()">
CLEAR RESPONSE
</button>

<button class="nextBtn" onclick="saveNext()">
SAVE & NEXT
</button>

</div>

</div>

<div class="right">

<h3>Question Palette</h3>

<div class="palette" id="palette"></div>

<br>

<p>
<span style="background:#5cb85c;padding:5px 10px"></span>
 Answered
</p>

<br>

<p>
<span style="background:#d9534f;padding:5px 10px"></span>
 Not Answered
</p>

<br>

<p>
<span style="background:#ffc107;padding:5px 10px"></span>
 Marked
</p>

<br>

<button class="downloadBtn" onclick="submitTest()">
SUBMIT TEST
</button>

</div>

</div>

</div>

<!-- RESULT PAGE -->

<div id="resultPage">

<div class="resultCard">

<h1 style="text-align:center;color:#003366">
FINAL RESULT
</h1>

<h2 style="margin-top:20px">
Student Name :
<span id="rName"></span>
</h2>

<h2>
Email :
<span id="rEmail"></span>
</h2>

<h2>
Mobile :
<span id="rMobile"></span>
</h2>


<table>

<tr>

<th>Subject</th>
<th>Total</th>
<th>Attempted</th>
<th>Correct</th>
<th>Wrong</th>
<th>Marks</th>
<th>Percentage</th>

</tr>

<tr>

<td>Mathematics</td>
<td id="mathTotal"></td>
<td id="mathAttempt"></td>
<td id="mathCorrect"></td>
<td id="mathWrong"></td>
<td id="mathMarks"></td>
<td id="mathPercent"></td>

</tr>

<tr>

<td>Physics</td>
<td id="phyTotal"></td>
<td id="phyAttempt"></td>
<td id="phyCorrect"></td>
<td id="phyWrong"></td>
<td id="phyMarks"></td>
<td id="phyPercent"></td>

</tr>

<tr>

<td>Chemistry</td>
<td id="chemTotal"></td>
<td id="chemAttempt"></td>
<td id="chemCorrect"></td>
<td id="chemWrong"></td>
<td id="chemMarks"></td>
<td id="chemPercent"></td>

</tr>

<tr style="background:#003366;color:white">

<td>Overall</td>
<td id="overallTotal"></td>
<td id="overallAttempt"></td>
<td id="overallCorrect"></td>
<td id="overallWrong"></td>
<td id="overallMarks"></td>
<td id="overallPercent"></td>

  </tr>
</table>

<button class="downloadBtn" onclick="window.print()">
DOWNLOAD PDF
</button>

<button class="downloadBtn" onclick="toggleAnswers()">
VIEW ANSWERS
</button>

</div>

<div id="answerReview" style="display:none"></div>

</div>

/* ======================
   VARIABLES
====================== */

let current=0;

let answers=new Array(questions.length).fill(null);

let marked=new Array(questions.length).fill(false);

let visited=new Array(questions.length).fill(false);

let totalTime=3600;

let timer;

/* ======================
   START EXAM
====================== */

function startExam(){

let name=document.getElementById("studentName").value.trim();

let email=document.getElementById("studentEmail").value.trim();

let mobile=document.getElementById("studentMobile").value.trim();

/* EMAIL VALIDATION */

let emailPattern =
/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

/* MOBILE VALIDATION */

let mobilePattern =
/^[6-9]\d{9}$/;

if(name==="" || email==="" || mobile===""){

alert("Please Fill All Details");

return;

}

if(!emailPattern.test(email)){

alert("Enter Valid Email ID");

return;

}

if(!mobilePattern.test(mobile)){

alert("Enter Valid 10 Digit Mobile Number");

return;

}

localStorage.setItem("name",name);

localStorage.setItem("email",email);

localStorage.setItem("mobile",mobile);

document.getElementById("loginPage").style.display="none";

document.getElementById("examPage").style.display="block";

document.getElementById("studentShow").innerHTML=name;

createPalette();

loadQuestion();

startTimer();

}
 
/* ======================
   TIMER
====================== */

function startTimer(){

timer=setInterval(()=>{

let hr=Math.floor(totalTime/3600);

let min=Math.floor((totalTime%3600)/60);

let sec=totalTime%60;

document.getElementById("timer").innerHTML=
`${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

totalTime--;

if(totalTime<0){

clearInterval(timer);

submitTest();

}

},1000);

}

/* ======================
   LOAD QUESTION
====================== */

function loadQuestion(){

visited[current]=true;

let q=questions[current];

document.getElementById("qNo").innerHTML=
`Question No. ${current+1}`;

document.getElementById("question").innerHTML=q.q;

let html="";

q.opt.forEach((o,index)=>{

html+=`

<label class="option">

<input type="radio"
name="option"
value="${index}"
${answers[current]===index?"checked":""}>

<span>${o}</span>

</label>

`;

});

document.getElementById("options").innerHTML=html;

updatePalette();

updateSubjectButton();

}

/* ======================
   SUBJECT BUTTON
====================== */

function updateSubjectButton(){

document.getElementById("mathBtn").classList.remove("active");

document.getElementById("phyBtn").classList.remove("active");

document.getElementById("chemBtn").classList.remove("active");

let sub=questions[current].subject;

if(sub==="math"){
document.getElementById("mathBtn").classList.add("active");
}

if(sub==="physics"){
document.getElementById("phyBtn").classList.add("active");
}

if(sub==="chemistry"){
document.getElementById("chemBtn").classList.add("active");
}

}

/* ======================
   SAVE ANSWER
====================== */

function saveAnswer(){

let selected=document.querySelector('input[name="option"]:checked');

if(selected){
answers[current]=Number(selected.value);
}

}

/* ======================
   NEXT
====================== */

function saveNext(){

saveAnswer();

if(current<questions.length-1){

current++;

loadQuestion();

}

}

/* ======================
   PREV
====================== */

function prevQuestion(){

saveAnswer();

if(current>0){

current--;

loadQuestion();

}

}

/* ======================
   MARK REVIEW
====================== */

function markReview(){

saveAnswer();

marked[current]=true;

updatePalette();

if(current<questions.length-1){

current++;

loadQuestion();

}

}

/* ======================
   CLEAR
====================== */

function clearResponse(){

answers[current]=null;

marked[current]=false;

loadQuestion();

}

/* ======================
   PALETTE
====================== */

function createPalette(){

let html="";

for(let i=0;i<questions.length;i++){

html+=`

<button
id="pal${i}"
class="paletteBtn"
onclick="jumpQuestion(${i})">

${i+1}

</button>

`;

}

document.getElementById("palette").innerHTML=html;

updatePalette();

}

/* ======================
   UPDATE PALETTE
====================== */

function updatePalette(){

for(let i=0;i<questions.length;i++){

let btn=document.getElementById(`pal${i}`);

btn.classList.remove(
"green",
"red",
"yellow",
"current"
);

if(answers[i]!==null){
btn.classList.add("green");
}

if(visited[i] && answers[i]===null){
btn.classList.add("red");
}

if(marked[i]){
btn.classList.remove("green");
btn.classList.add("yellow");
}

if(i===current){
btn.classList.add("current");
}

}

}

/* ======================
   JUMP QUESTION
====================== */

function jumpQuestion(i){

saveAnswer();

current=i;

loadQuestion();

}

/* ======================
   RESULT CALCULATION
====================== */

function calculateSection(subject){

let total=0;
let attempt=0;
let correct=0;
let wrong=0;

questions.forEach((q,index)=>{

if(q.subject===subject){

total++;

if(answers[index]!==null){

attempt++;

if(answers[index]===q.ans){

correct++;

}else{

wrong++;

}

}

}

});

let marks=(correct*4)-wrong;

if(marks<0){
marks=0;
}

let percent=((marks/(total*4))*100).toFixed(2);

return {
total,
attempt,
correct,
wrong,
marks,
percent
};

}

/* OVERALL */

let totalQ=questions.length;

let totalAttempt=

let totalCorrect=

phy.correct+

/* ======================
   ANSWER REVIEW
====================== */

function showAnswers(){

let html="";

questions.forEach((q,index)=>{

let userAns=
answers[index]!==null
? q.opt[answers[index]]
: "Not Answered";

let correctAns=q.opt[q.ans];

let status="";

if(answers[index]===null){

status="<span style='color:red'>NOT ANSWERED</span>";

}else if(answers[index]===q.ans){

status="<span style='color:green'>CORRECT</span>";

}else{

status="<span style='color:red'>WRONG</span>";

}

html+=`

<div class="reviewBox">

<h3>Question ${index+1}</h3>

<p>
<b>Subject :</b>
${q.subject.toUpperCase()}
</p>

<br>

<p>
<b>Question :</b>
${q.q}
</p>

<br>

<p>
<b>Your Answer :</b>
${userAns}
</p>

<br>

<p>
<b>Correct Answer :</b>
${correctAns}
</p>

<br>

<p>
<b>Status :</b>
${status}
</p>

</div>

`;

});

document.getElementById("answerReview").innerHTML=html;

}

/* ======================
   TOGGLE ANSWERS
====================== */

function toggleAnswers(){

let box=document.getElementById("answerReview");

if(box.style.display==="none"){

box.style.display="block";

}else{

box.style.display="none";

}

}
