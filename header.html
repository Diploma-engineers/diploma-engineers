<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ================= TOP NOTIFICATION ================= */
#banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#ff9800;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:9999;
    font-size:14px;
}

/* ================= NAVBAR ================= */
.navbar{
    background:rgba(13,27,42,0.95);
    backdrop-filter:blur(10px);
    padding:14px 0;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);

    position:fixed;
    top:45px;   /* banner height */
    width:100%;
    z-index:9998;
}

.navbar-brand{
    font-size:28px;
    font-weight:800;
}

.nav-link{
    color:white !important;
    margin-left:15px;
    position:relative;
    font-weight:500;
}

/* underline animation */
.nav-link::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:#ff9800;
    transition:0.3s;
}

.nav-link:hover::after{
    width:100%;
}

/* BODY SPACE */
body{
    padding-top:110px;
}

/* CLOSE BUTTON */
.close-btn{
    background:white;
    border:none;
    padding:3px 10px;
    border-radius:4px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- ================= NOTIFICATION ================= -->
<div id="banner">

    <div>
        📲 Download Diploma Engineers App for Notes & Updates
    </div>

    <div>
        <a href="#" class="btn btn-dark btn-sm">Install</a>

        <button class="close-btn" id="closeBtn">✖</button>
    </div>

</div>

<!-- NAVBAR (YOUR ORIGINAL) -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<span style="color:white;">Diploma</span>
<span style="color:#ffcc00;">Engineers</span>
</a>

<button class="navbar-toggler bg-light"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="notes.html">Books & Notes</a></li>

<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

</div>

</div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

document.getElementById("closeBtn").addEventListener("click", function(){
    document.getElementById("banner").style.display = "none";
});
</script>

</body>
</html>
