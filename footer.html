<title>Footer System</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* BODY */
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f4f7fb;
}

/* FOOTER */
footer{
    background:#0d1b2a;
    color:white;
    padding:70px 20px 20px;
    margin-top:100px;
}

.footer-title{
    font-weight:700;
    margin-bottom:20px;
}

.footer-links{
    list-style:none;
    padding:0;
}

.footer-links li{
    margin-bottom:10px;
}

.footer-links a{
    text-decoration:none;
    color:#ccc;
    transition:0.3s;
}

.footer-links a:hover{
    color:#ff9800;
    padding-left:5px;
}

/* BOTTOM */
.footer-bottom{
    text-align:center;
    border-top:1px solid rgba(255,255,255,0.1);
    margin-top:40px;
    padding-top:20px;
    color:#bbb;
}

/* SOCIAL ICONS */
.social-icons a{
    color:white;
    font-size:20px;
    margin-right:12px;
    transition:0.3s;
}

.social-icons a:hover{
    color:#ff9800;
    transform:translateY(-3px);
}

.floating-social{
    position:fixed;
    right:20px;
    bottom:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:999;
}

.floating-social a{
    width:55px;
    height:55px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    color:white;
    font-size:24px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.3s;
}

/* WhatsApp */
.whatsapp{
    background:#25D366;
}

/* Telegram */
.telegram{
    background:#0088cc;
}

.floating-social a:hover{
    transform:scale(1.15) rotate(5deg);
}

</style>
</head>
