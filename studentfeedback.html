<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Feedback - Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    padding-top:80px;
    background: linear-gradient(135deg,#eef6ff,#f8fafc);
}

/* TITLE */
.title{
    text-align:center;
    font-weight:700;
    margin-top:40px;
}
.title span{
    color:#ff7b00;
}

/* FORM CARD */
.feedback-card{
    max-width:550px;
    margin:40px auto;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    border:1px solid rgba(255,255,255,0.5);
}

.feedback-card input,
.feedback-card textarea,
.feedback-card select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
    transition:0.3s;
    font-size:14px;
}

.feedback-card input:focus,
.feedback-card textarea:focus,
.feedback-card select:focus{
    border-color:#2563eb;
    box-shadow:0 0 8px rgba(37,99,235,0.2);
}

/* BUTTON */
.btn-submit{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    font-weight:600;
    transition:0.3s;
}

.btn-submit:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* NOTE */
.note{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:14px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => document.getElementById("header").innerHTML = data);
</script>

<!-- TITLE -->
<h2 class="title">Student <span>Feedback</span></h2>
<p class="text-center text-secondary">Share your experience with Diploma Engineers</p>

<!-- FORM -->
<div class="feedback-card">

<form action="https://formsubmit.co/astar22072006@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<select name="rating" required>
    <option value="">Rate Us</option>
    <option>Excellent</option>
    <option>Good</option>
    <option>Average</option>
    <option>Poor</option>
</select>

<textarea name="message" rows="5" placeholder="Your Feedback" required></textarea>

<button type="submit" class="btn-submit">
<i class="fa-solid fa-paper-plane"></i> Submit Feedback
</button>

</form>

<p class="note">⚡ Your feedback helps us improve the platform</p>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => document.getElementById("footer").innerHTML = data);
</script>

</body>
</html>
