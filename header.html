<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diploma Engineers</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* APP BANNER */
.app-banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#ff9800;
    color:#000;
    padding:10px 0;
    z-index:9999;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    font-weight:500;
}

.app-banner .text{
    font-size:14px;
}

/* NAVBAR */
.navbar{
    background:rgba(13,27,42,0.95);
    backdrop-filter:blur(10px);
    padding:14px 0;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    position:fixed;
    top:50px; /* banner height adjust */
    width:100%;
    z-index:9998;
}

.navbar-brand{
    font-size:28px;
    font-weight:800;
}

.nav-link{
    color:white !important;
    margin-left:15px;
    position:relative;
    font-weight:500;
}

/* underline animation */
.nav-link::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:#ff9800;
    transition:0.3s;
}

.nav-link:hover::after{
    width:100%;
}

/* PAGE SPACING */
body{
    padding-top:120px;
}

/* MOBILE */
@media(max-width:768px){
    .navbar-brand{
        font-size:24px;
    }
}

</style>
</head>

<body>

<!-- ================= APP DOWNLOAD BANNER ================= -->
<div id="appBanner" class="app-banner">
  <div class="container d-flex justify-content-between align-items-center">

    <div class="text">
      📲 Download Diploma Engineers App for Notes, Results & Updates!
    </div>

    <div>
      <a href="https://your-app-link.com" class="btn btn-dark btn-sm" target="_blank">
        Download
      </a>

      <button class="btn btn-light btn-sm ms-2" onclick="closeBanner()">
        ✖
      </button>
    </div>

  </div>
</div>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand" href="index.html">
<span style="color:white;">Diploma</span>
<span style="color:#ffcc00;">Engineers</span>
</a>

<button class="navbar-toggler bg-light"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="notes.html">Books & Notes</a></li>

<li class="nav-item"><a class="nav-link" href="result.html">Result</a></li>
<li class="nav-item"><a class="nav-link" href="admitcard.html">Admit Card</a></li>
<li class="nav-item"><a class="nav-link" href="jeecup.html">JEECUP</a></li>
<li class="nav-item"><a class="nav-link" href="studentfeedback.html">Feedback</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

</ul>

</div>
</div>
</nav>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- CLOSE BANNER SCRIPT -->
<script>
function closeBanner(){
    document.getElementById("appBanner").style.display = "none";
    document.querySelector(".navbar").style.top = "0";
    document.body.style.paddingTop = "80px";
}
</script>

</body>
</html>
