<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hindi TGT CBT Mock Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f4f6;
}

/* HEADER */

.header{
height:60px;
background:#0f172a;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
color:#fff;
position:sticky;
top:0;
z-index:1000;
}

.header h1{
font-size:18px;
font-weight:600;
}

.timer{
font-size:20px;
font-weight:700;
color:#facc15;
}

/* LOGIN */

.login-box{
width:90%;
max-width:400px;
background:#fff;
margin:40px auto;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
text-align:center;
}

.login-box h2{
margin-bottom:15px;
}

.login-box p{
margin-bottom:20px;
color:#666;
font-size:14px;
}

.login-box input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
outline:none;
font-size:15px;
}

.login-box button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
}

/* TEST CONTAINER */

.container{
display:none;
height:calc(100vh - 60px);
}

/* LEFT */

.left{
flex:1;
padding:15px;
overflow-y:auto;
}

/* QUESTION BOX */

.question-box{
background:#fff;
padding:18px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.06);
}

#qno{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}

.question{
font-size:22px;
font-weight:600;
line-height:1.7;
margin-bottom:20px;
}

/* OPTIONS */

.option{
display:flex;
align-items:center;
background:#f3f4f6;
padding:15px;
border-radius:10px;
margin-bottom:12px;
cursor:pointer;
transition:.3s;
border:2px solid transparent;
}

.option:hover{
background:#e0e7ff;
}

.option.selected{
background:#dbeafe;
border-color:#2563eb;
}

.option input{
margin-right:10px;
}

/* BUTTONS */

.buttons{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.buttons button{
padding:12px 18px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
color:#fff;
}

.review{
background:#f97316;
}

.next{
background:#2563eb;
}

.submit{
background:#dc2626;
}

/* RIGHT SIDE */

.right{
width:200px;
background:#f8fafc;
border-left:1px solid #ddd;
padding:12px;
overflow-y:auto;
}

.right h3{
font-size:18px;
margin-bottom:15px;
}

/* QUESTION PALETTE */

.palette{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.palette button{
height:36px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
background:#cbd5e1;
transition:.3s;
}

.palette button:hover{
transform:scale(1.05);
}

/* COLORS */

.notattempted{
background:#cbd5e1;
}

.attempted{
background:#22c55e !important;
color:#fff;
}

.marked{
background:#f97316 !important;
color:#fff;
}

/* LEGEND */

.legend{
margin-top:20px;
font-size:14px;
}

.legend div{
display:flex;
align-items:center;
margin-bottom:10px;
}

.legend span{
width:18px;
height:18px;
border-radius:4px;
display:inline-block;
margin-right:10px;
}

/* RESULT */

.result{
display:none;
padding:20px;
}

.result h1{
margin-bottom:20px;
}

.result table{
width:100%;
border-collapse:collapse;
background:#fff;
margin-top:20px;
}

.result th{
background:#2563eb;
color:#fff;
padding:12px;
border:1px solid #ddd;
}

.result td{
padding:10px;
border:1px solid #ddd;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.container{
display:flex;
flex-direction:row;
}

.left{
width:72%;
padding:10px;
}

.right{
width:28%;
padding:8px;
}

.palette{
grid-template-columns:repeat(2,1fr);
gap:6px;
}

.palette button{
height:32px;
font-size:12px;
}

.question{
font-size:16px;
}

.option{
font-size:14px;
padding:12px;
}

.buttons{
gap:6px;
}

.buttons button{
padding:10px 12px;
font-size:12px;
}

.header h1{
font-size:14px;
}

.timer{
font-size:16px;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>🎯 Hindi TGT CBT Mock Test</h1>

<div class="timer">
⏰ <span id="time">3600</span>s
</div>

</div>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<h2>Start Mock Test 🚀</h2>

<p>
Hindi TGT Full CBT Practice Test
</p>

<input type="text" id="name" placeholder="Enter Name">

<input type="number" id="mobile" placeholder="Enter Mobile Number">

<button onclick="startTest()">
Start Test
</button>

</div>

<!-- TEST -->

<div class="container" id="testBox">

<!-- LEFT -->

<div class="left">

<div class="question-box">

<div id="qno"></div>

<div class="question" id="question"></div>

<div id="options"></div>

<div class="buttons">

<button class="review" onclick="markReview()">
📌 Mark Review
</button>

<button class="next" onclick="nextQ()">
➡ Next
</button>

<button class="submit" onclick="submitTest()">
✅ Submit
</button>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<h3>📋 Questions</h3>

<div class="palette" id="palette"></div>

<div class="legend">

<div>
<span style="background:#22c55e;"></span>
Answered
</div>

<div>
<span style="background:#cbd5e1;"></span>
Not Answered
</div>

<div>
<span style="background:#f97316;"></span>
Marked Review
</div>

</div>

</div>

</div>

<!-- RESULT -->

<div class="result" id="resultBox">

<h1 id="scoreBox"></h1>

<div id="summary"></div>

<div style="overflow-x:auto;">

<table>

<thead>

<tr>
<th>Q.No</th>
<th>Your Answer</th>
<th>Correct Answer</th>
<th>Status</th>
</tr>

</thead>

<tbody id="resultTable"></tbody>

</table>

</div>

</div>

<script>

<script>

let questions=[

opt:[

"उस जनपद का कवि हूँ - त्रिलोचन शास्त्री",
"सीढ़ियों पर धूप में - शमशेर बहादुर सिंह",
"संसद से सड़क तक - सुदामा पाण्डेय धूमिल"
],
ans:2
},

{

"रामेश्वर त्रिपाठी",
"बालकृष्ण शर्मा नवीन",

],
ans:2
},

{
q:"'पहला गिरमिटिया' उपन्यास विशेषकर किस पर केन्द्रित है?",
opt:[
"पं. जवाहरलाल नेहरू",

{

opt:[

"आवाँ - चित्रा मुद्गल",
"तमस - राजी सेठ",
"मुझे सूरज चाहिए - सुरेन्द्र वर्मा"

ans:2

{
q:"साम्प्रदायिकता समस्या पर लिखा गया उपन्यास कौन है?",

},

{
q:"फणीश्वरनाथ रेणु की कौन सी कहानी है?",
opt:[
"रसप्रिया",
"रसआखेटक",

"प्रियानीलकण्ठी"
],
ans:0
},

{
q:"उदयप्रकाश द्वारा कौन सी कहानी नहीं है?",
opt:[
"तिरिछ",
"पाल गोमरा का स्कूटर",
"पीली आँधी",
"दरियाई घोड़ा"
],
ans:2
},

{
q:"सर्वेश्वर दयाल सक्सेना की नाट्य कृति का नाम है -",

opt:[
"नरेश मेहता",

"रांगेय राघव"
],
ans:0
},

{
q:"पाप और पुण्य के चिरंतन नैतिक प्रश्न को किस उपन्यास में प्रस्तुत किया गया है?",
opt:[
"सामर्थ्य और सीमा",

"भूले बिसरे चित्र",
"आखिरी दाँव"
],
ans:1

{
q:"'दुक्खम-सुक्खम' उपन्यास की लेखिका हैं?",
opt:[

"ममता कालिया",

],

opt:[
"जीवनी",
"रिपोर्ताज",
"प्रगीत",
"यात्रावृत्त"
],
ans:1
},

{
q:"निम्न में से कौन रेखाचित्र विधा की रचना नहीं है?",
opt:[
"कठगुलाब",
"क्षण बोले कण मुस्काए",
"पुरानी स्मृतियाँ",
"रेखाएँ बोल उठीं"
],
ans:0
},

{
q:"निम्न में से दलित आत्मकथा नहीं है?",
opt:[
"अपने-अपने पिंजरे",
"जूठन",
"तिरस्कृत",
"मेरी असफलताएँ"
],
ans:3
},

{
q:"निम्न में से 'मनोवैज्ञानिक उपन्यासकार' किसे कहा जा सकता है?",
opt:[
"जैनेन्द्र कुमार",
"प्रेमचन्द",
"यशपाल",
"भगवतीचरण वर्मा"
],
ans:0
  }

]:

/* VARIABLES */

let current=0;
let answers=new Array(questions.length).fill(null);
let marked=[];

/* START */

function startTest(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;

if(name==="" || mobile===""){
alert("Please Fill Details");
return;
}

document.getElementById("loginBox").style.display="none";

document.getElementById("testBox").style.display="flex";

loadQuestion();

createPalette();

startTimer();

}

/* LOAD QUESTION */

function loadQuestion(){

let q=questions[current];

document.getElementById("qno").innerHTML=
"Question " + (current+1);

document.getElementById("question").innerHTML=q.q;

let html="";

q.opt.forEach((o,i)=>{

html += `
<label class="option ${answers[current]==i?'selected':''}">
<input type="radio" name="opt"
${answers[current]==i?'checked':''}
onclick="selectOption(${i})">
${o}
</label>
`;

});

document.getElementById("options").innerHTML=html;

updatePalette();

}

/* SELECT OPTION */

function selectOption(i){

answers[current]=i;

loadQuestion();

}

/* NEXT */

function nextQ(){

if(current<questions.length-1){

current++;

loadQuestion();

}

}

/* MARK REVIEW */

function markReview(){

if(!marked.includes(current)){

marked.push(current);

}

updatePalette();

}

/* CREATE PALETTE */

function createPalette(){

let html="";

for(let i=0;i<100;i++){

html += `
<button id="p${i}"
class="notattempted"
onclick="gotoQuestion(${i})">
${i+1}
</button>
`;

}

document.getElementById("palette").innerHTML=html;

}

/* UPDATE PALETTE */

function updatePalette(){

for(let i=0;i<questions.length;i++){

let btn=document.getElementById("p"+i);

btn.className="";

if(marked.includes(i)){

btn.classList.add("marked");

}
else if(answers[i]!=null){

btn.classList.add("attempted");

}
else{

btn.classList.add("notattempted");

}

}

}

/* GOTO QUESTION */

function gotoQuestion(i){

if(i<questions.length){

current=i;

loadQuestion();

}

}

/* TIMER */

let time=3600;

function startTimer(){

let timer=setInterval(()=>{

time--;

document.getElementById("time").innerHTML=time;

if(time<=0){

clearInterval(timer);

submitTest();

}

},1000);

}

/* SUBMIT */

function submitTest(){

let score=0;
let attempted=0;
let table="";

questions.forEach((q,i)=>{

let status="";
let user="Not Answered";

if(answers[i]!=null){

attempted++;

user=q.opt[answers[i]];

if(answers[i]==q.ans){

score+=4;

status=`<span class="correct">Correct</span>`;

}
else{

score-=1;

status=`<span class="wrong">Wrong</span>`;

}

}
else{

status=`<span style="color:#555;">Not Attempted</span>`;

}

table += `
<tr>
<td>${i+1}</td>
<td>${user}</td>
<td>${q.opt[q.ans]}</td>
<td>${status}</td>
</tr>
`;

});

document.getElementById("testBox").style.display="none";

document.getElementById("resultBox").style.display="block";

document.getElementById("scoreBox").innerHTML=
`🎉 Your Score : ${score}`;

document.getElementById("summary").innerHTML=
`
<h2>Total Questions : ${questions.length}</h2>
<h2>Attempted : ${attempted}</h2>
<h2>Correct Marks : +4</h2>
<h2>Negative Marks : -1</h2>
`;

document.getElementById("resultTable").innerHTML=table;

}

</script>

</body>
</html>
