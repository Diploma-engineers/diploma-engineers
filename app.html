<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#ff6b00;
--bg:#f6f8ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--bg);
}

/* LOGIN */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6b00,#ff944d);
padding:20px;
}

.login-box{
background:white;
padding:25px;
border-radius:18px;
width:100%;
max-width:350px;
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
}

.login-btn{
width:100%;
padding:12px;
background:var(--primary);
color:white;
border:none;
border-radius:10px;
font-weight:600;
}

/* APP */
#app{
display:none;
}

/* NAVBAR */
.navbar{
background:white;
padding:12px 15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.logo{
font-weight:700;
}

.logo span{
color:var(--primary);
}

/* HERO */
.hero{
padding:15px;
}

.banner{
background:linear-gradient(135deg,var(--primary),#ff944d);
color:white;
padding:20px;
border-radius:18px;
}

/* SECTIONS */
.section{
padding:15px;
}

.section-title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

/* BOTTOM NAV (IMPORTANT FIX) */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:none;   /* 🔥 LOGIN SE PEHLE HIDE */
justify-content:space-around;
padding:10px 0;
box-shadow:0 -5px 20px rgba(0,0,0,0.08);
}

.bottom-nav a{
text-decoration:none;
color:#777;
font-size:12px;
text-align:center;
}

.bottom-nav i{
display:block;
font-size:18px;
}

.bottom-nav a.active{
color:var(--primary);
}

/* PROFILE */
.profile{
display:none;
padding:20px;
text-align:center;
}

.profile-card{
background:white;
padding:20px;
border-radius:18px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:var(--primary);
color:white;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:28px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>Login</h2>
<input type="text" id="name" placeholder="Enter Name">
<button class="login-btn" onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app">

<!-- TOP -->
<div class="navbar">
<div class="logo">Diploma <span>Engineers</span></div>
<div><i class="fas fa-user-circle fa-lg"></i></div>
</div>

<!-- HOME -->
<div id="home">

<section class="hero">
<div class="banner">
<h3>Welcome, <span id="userName">User</span></h3>
<p>Notes • PYQ • E-Books</p>
</div>
</section>

<section class="section">
<div class="section-title">Dashboard</div>

<div class="grid">
<div class="card"><i class="fas fa-book"></i><p>Notes</p></div>
<div class="card"><i class="fas fa-file-pdf"></i><p>E-Books</p></div>
<div class="card"><i class="fas fa-layer-group"></i><p>PYQ</p></div>
<div class="card"><i class="fas fa-bell"></i><p>Updates</p></div>
</div>

</section>

</div>

<!-- PROFILE -->
<div class="profile" id="profile">
<div class="profile-card">
<div class="avatar" id="avatar">U</div>
<h3 id="profileName">User</h3>
<p>Diploma Student</p>
</div>
</div>

</div>

<!-- BOTTOM NAV (LOGIN KE BAAD HI SHOW HOGA) -->
<div class="bottom-nav" id="bottomNav">

<a href="#" class="active" onclick="showHome()">
<i class="fas fa-home"></i>Home
</a>

<a href="notes.html">
<i class="fas fa-book"></i>Notes
</a>

<a href="Books.html">
<i class="fas fa-file-pdf"></i>E-Books
</a>

<a href="P.Y.Q.html">
<i class="fas fa-layer-group"></i>PYQ
</a>

<a href="#" onclick="showProfile()">
<i class="fas fa-user"></i>Profile
</a>

</div>

<script>

function login(){

let name=document.getElementById("name").value;
if(name==""){alert("Enter Name");return;}

localStorage.setItem("user",name);

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("bottomNav").style.display="flex"; // 🔥 SHOW AFTER LOGIN

setUser(name);
}

function setUser(name){
document.getElementById("userName").innerText=name;
document.getElementById("profileName").innerText=name;
document.getElementById("avatar").innerText=name.charAt(0).toUpperCase();
}

function showHome(){
document.getElementById("home").style.display="block";
document.getElementById("profile").style.display="none";
}

function showProfile(){
document.getElementById("home").style.display="none";
document.getElementById("profile").style.display="block";
}

window.onload=function(){
let user=localStorage.getItem("user");

if(user){
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("bottomNav").style.display="flex"; // 🔥 IMPORTANT FIX
setUser(user);
}
}

</script>

</body>
</html>
