<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diploma Engineers - Admit Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    padding-top:80px;
    background:#f4f7fb;
}

/* CARD */
.admit-card-box{
    background:#fff;
    padding:35px;
    border-radius:20px;
    max-width:450px;
    margin:70px auto;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.icon-box{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:35px;
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    outline:none;
}

.input-box input:focus{
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,0.2);
}

.download-btn{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    font-weight:600;
    cursor:pointer;
}

.download-btn:hover{
    transform:translateY(-2px);
}

.sample{
    margin-top:15px;
    background:#f1f5f9;
    padding:10px;
    border-radius:10px;
    color:#2563eb;
    font-weight:600;
}

</style>
</head>

<body>

<!-- HEADER (reuse) -->
<div id="header"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => document.getElementById("header").innerHTML = data);
</script>

<!-- MAIN -->
<div class="container">

<div class="admit-card-box">

<div class="icon-box">
<i class="fa-solid fa-file-arrow-down"></i>
</div>

<h2>BTEUP Admit Card</h2>
<p>Enter enrollment number to download admit card</p>

<div class="input-box">
<input type="text" id="enrollment" placeholder="Enter Enrollment Number">
</div>

<button class="download-btn" onclick="downloadAdmitCard()">
<i class="fa-solid fa-download"></i> Download
</button>

<div class="sample">
Example: E21222532500063
</div>

</div>
</div>

<script>
function downloadAdmitCard(){
    let enroll = document.getElementById("enrollment").value.trim();

    if(!enroll){
        alert("Please enter enrollment number");
        return;
    }

    let url = "https://bteup.ac.in/ESeva/Student/AdmitCard.aspx?EnrollNumber=" 
              + encodeURIComponent(enroll);

    window.open(url, "_blank");
}
</script>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => document.getElementById("footer").innerHTML = data);
</script>

</body>
</html>
