<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Polytechnic CBT Mock Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef2f7;
}

/* HEADER */

.header{
background:#0f172a;
color:#fff;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.header h1{
font-size:20px;
}

.timer{
font-size:20px;
font-weight:700;
color:#facc15;
}

/* LOGIN */

.login-box{
width:90%;
max-width:420px;
background:#fff;
margin:40px auto;
padding:30px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#0f172a;
}

.login-box input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
outline:none;
}

.login-box button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:#fff;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
background:#1d4ed8;
}

/* MAIN */

.container{
display:none;
height:calc(100vh - 70px);
}

/* LEFT */

.left{
flex:3;
background:#fff;
padding:20px;
overflow:auto;
}
