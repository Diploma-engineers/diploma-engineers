<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Diploma Engineers - Header</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f4f7fb;
    padding-top:105px;
}

/* =====================================================
TOP APP BAR
===================================================== */

#topbar{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    background:#ff9800;

    padding:8px 15px;

    z-index:99999;

    box-shadow:0 3px 12px rgba(0,0,0,0.15);

}

.topbar-content{

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:10px;

}

.topbar-text{

    color:white;

    font-size:13px;

    font-weight:500;

}

.topbar-buttons{

    display:flex;

    align-items:center;

    gap:8px;

}

.install-btn{

    background:#111827;

    color:white;

    text-decoration:none;

    padding:6px 12px;

    border-radius:8px;

    font-size:12px;

    font-weight:600;

    transition:0.3s;

}

.install-btn:hover{

    background:black;

    transform:translateY(-1px);

}

.close-btn{

    border:none;

    background:white;

    width:28px;

    height:28px;

    border-radius:8px;

    cursor:pointer;

    font-size:12px;

    transition:0.3s;

}

.close-btn:hover{

    background:#f1f5f9;

}

/* =====================================================
NAVBAR
===================================================== */

.custom-navbar{

    position:fixed;

    top:46px;

    left:0;

    width:100%;

    z-index:9999;

    background:rgba(13,27,42,0.96);

    backdrop-filter:blur(12px);

    padding:10px 0;

    transition:0.3s ease;

    box-shadow:0 4px 20px rgba(0,0,0,0.08);

}

.custom-navbar.scrolled{

    background:#08111f;

    padding:7px 0;

}

/* =====================================================
LOGO
===================================================== */

.navbar-brand{

    display:flex;

    align-items:center;

    gap:8px;

    font-size:22px;

    font-weight:700;

}

.logo-box{

    width:40px;

    height:40px;

    border-radius:12px;

    background:linear-gradient(135deg,#ff9800,#ffcc00);

    display:flex;

    align-items:center;

    justify-content:center;

    color:white;

    font-size:18px;

    box-shadow:0 5px 15px rgba(255,152,0,0.35);

}

.brand-white{
    color:white;
}

.brand-yellow{
    color:#ffcc00;
}

/* =====================================================
RIGHT SIDE MENU
===================================================== */

.navbar-collapse{
    justify-content:flex-end;
}

/* =====================================================
NAV LINKS
===================================================== */

.nav-link{

    color:white !important;

    margin-left:8px;

    padding:10px 14px !important;

    border-radius:12px;

    display:flex;

    align-items:center;

    gap:7px;

    font-size:14px;

    font-weight:500;

    transition:0.3s;

}

.nav-link i{
    font-size:14px;
}

.nav-link:hover{

    background:rgba(255,255,255,0.08);

    color:#ffcc00 !important;

    transform:translateY(-2px);

}

.nav-link.active{

    background:linear-gradient(135deg,#ff9800,#ff5722);

    color:white !important;

    box-shadow:0 5px 14px rgba(255,87,34,0.3);

}

/* =====================================================
MENU BUTTON
===================================================== */

.navbar-toggler{

    background:white;

    border:none;

    border-radius:10px;

    padding:5px 10px;

}

.navbar-toggler:focus{
    box-shadow:none;
}

/* =====================================================
MOBILE
===================================================== */

@media(max-width:991px){

    body{
        padding-top:110px;
    }

    .navbar-collapse{

        margin-top:15px;

        background:#10243d;

        padding:16px;

        border-radius:18px;

    }

    .nav-link{

        margin:5px 0;

    }

}

@media(max-width:768px){

    .navbar-brand{

        font-size:18px;

    }

    .logo-box{

        width:34px;
        height:34px;

        font-size:15px;

    }

    .navbar-toggler{

        padding:4px 8px;

        font-size:13px;

    }

    .topbar-text{

        font-size:11px;

    }

    .install-btn{

        padding:5px 10px;

        font-size:11px;

    }

    .close-btn{

        width:24px;
        height:24px;

        font-size:10px;

    }

}

</style>

</head>

<i class="fa-solid fa-bars"></i>

</button>

<!-- MENU -->

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav">

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* =====================================================
NAVBAR SCROLL EFFECT
===================================================== */

window.addEventListener("scroll", function(){

    const navbar = document.querySelector(".custom-navbar");

    navbar.classList.toggle("scrolled", window.scrollY > 20);

});

/* =====================================================
TOPBAR CLOSE BUTTON
===================================================== */

const closeBtn = document.getElementById("closeBtn");
const topbar = document.getElementById("topbar");
const navbar = document.querySelector(".custom-navbar");

closeBtn.addEventListener("click", function(){

    topbar.style.display = "none";

    navbar.style.top = "0";

    document.body.style.paddingTop = "75px";

});

</script>
