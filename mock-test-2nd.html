*{
margin:0;
padding:0;
box-sizing:border-box;

body{
background:#eef2f7;
}

.header{
background:#0f172a;

padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.header h1{
font-size:20px;
}

.timer{
font-size:20px;
font-weight:700;
color:#facc15;
}

.login-box{
width:90%;
max-width:420px;
background:#fff;
margin:40px auto;
padding:30px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#0f172a;
}

.login-box input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
outline:none;
}

.login-box button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:#fff;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
background:#1d4ed8;
}

.container{
display:none;
height:calc(100vh - 70px);
}

.left{
flex:3;
background:#fff;
padding:20px;
overflow:auto;
}

.right{
flex:1;
background:#f8fafc;
padding:15px;
border-left:2px solid #ddd;
overflow:auto;
}

.question-box{
font-size:20px;
font-weight:600;
line-height:1.7;
margin-bottom:20px;
}

.question-box img{
width:100%;
max-width:350px;
margin-top:15px;
border-radius:12px;
border:1px solid #ddd;
}

.option{
display:block;
background:#f1f5f9;
padding:15px;
margin:12px 0;
border-radius:12px;
cursor:pointer;
transition:.3s;
font-size:16px;
}

.option:hover{
background:#dbeafe;
transform:translateY(-2px);
}

.option input{
margin-right:10px;
}

.buttons{
margin-top:20px;
}

.buttons button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.next{
background:#2563eb;
color:#fff;
}

.review{
background:#f97316;
color:#fff;
}

.submit{
background:#dc2626;
color:#fff;
}

.palette{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

.palette button{
width:42px;
height:42px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.notattempted{
background:#cbd5e1;
}

.attempted{
background:#16a34a;
color:#fff;
}

.marked{
background:#f97316;
color:#fff;
}

.result{
display:none;
padding:25px;
text-align:center;
}

.result h1{
margin-bottom:20px;
color:#0f172a;
}

.result table{
width:100%;
border-collapse:collapse;
margin-top:25px;
background:#fff;
}

.result th{
background:#2563eb;
color:#fff;
padding:14px;
border:1px solid #ddd;
}

.result td{
padding:12px;
border:1px solid #ddd;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}

.notdone{
color:#555;
font-weight:bold;
}

@media(max-width:768px){
.container{
flex-direction:column;
height:auto;

.right{
border-left:none;
border-top:2px solid #ddd;

<div class="header">

<button onclick="startTest()">Start Test</button>
</div>

<div class="container" id="testBox">

<div class="left">
<div id="qno"></div>
<div class="question-box" id="question"></div>
<div id="options"></div>

<div class="buttons">
<button class="review" onclick="markReview()">📌 Mark Review</button>
<button class="next" onclick="nextQ()">➡ Next</button>
<button class="submit" onclick="submitTest()">✅ Submit</button>
</div>
</div>

<div class="right">
<h3>📋 Questions</h3>
<div class="palette" id="palette"></div>
</div>

</div>

<div class="result" id="resultBox">
<h1 id="scoreBox"></h1>
<div style="overflow-x:auto;">

</table>
</div>
</div>

let current=0;
let answers=new Array(questions.length).fill(null);
let marked=[];
let time=3600;

function startTest(){
let name=document.getElementById('name').value;
let mobile=document.getElementById('mobile').value;

if(name==='' || mobile===''){
alert('Please enter details');
return;
}

document.getElementById('loginBox').style.display='none';
document.getElementById('testBox').style.display='flex';

loadQuestion();
createPalette();
startTimer();
}

function loadQuestion(){
let q=questions[current];

document.getElementById('qno').innerHTML=`<h3>Question ${current+1} of ${questions.length}</h3>`;

let html=q.q;

if(q.img){
html+=`<br><img src="${q.img}">`;
}

document.getElementById('question').innerHTML=html;

let ops='';
q.opt.forEach((o,i)=>{
ops+=`
<label class="option">
<input type="radio" name="opt" value="${i}" ${answers[current]==i?'checked':''}>
${o}
</label>`;
});

document.getElementById('options').innerHTML=ops;

updatePalette();
}

function saveAnswer(){
let selected=document.querySelector('input[name="opt"]:checked');
if(selected){
answers[current]=parseInt(selected.value);
}
}

function nextQ(){
saveAnswer();
if(current<questions.length-1){
current++;
loadQuestion();
}
}

function markReview(){
saveAnswer();
if(!marked.includes(current)){
marked.push(current);
}
updatePalette();
}

function createPalette(){
let palette='';
questions.forEach((q,i)=>{
palette+=`<button onclick="gotoQ(${i})" id="p${i}" class="notattempted">${i+1}</button>`;
});

document.getElementById('palette').innerHTML=palette;
}

function updatePalette(){
questions.forEach((q,i)=>{
let btn=document.getElementById(`p${i}`);
btn.className='notattempted';

if(answers[i]!=null){
btn.className='attempted';
}

if(marked.includes(i)){
btn.className='marked';
}
});
}

function gotoQ(i){
saveAnswer();
current=i;
loadQuestion();
}

function startTimer(){
setInterval(()=>{
time--;
document.getElementById('time').innerText=time;

if(time<=0){
submitTest();
}
},1000);
}

function submitTest(){
saveAnswer();

document.getElementById('testBox').style.display='none';
document.getElementById('resultBox').style.display='block';

let score=0;
let table='';

questions.forEach((q,i)=>{
let user=answers[i];
let status='';

if(user==q.ans){
score++;
status='<span class="correct">Correct</span>';
}else if(user==null){
status='<span class="notdone">Not Attempted</span>';
}else{
status='<span class="wrong">Wrong</span>';
}

let userAns=user!=null?q.opt[user]:'-';

table+=`
<tr>
<td>${i+1}</td>
<td>${userAns}</td>
<td>${q.opt[q.ans]}</td>
<td>${status}</td>
</tr>`;
});

let percent=((score/questions.length)*100).toFixed(2);

document.getElementById('scoreBox').innerHTML=`🎉 Score: ${score}/${questions.length} (${percent}%)`;
document.getElementById('resultTable').innerHTML=table;
}

</script>
