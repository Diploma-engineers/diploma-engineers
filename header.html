<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diploma Engineers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ================= TOP NOTIFICATION ================= */
.app-banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:linear-gradient(90deg,#ff9800,#ffb74d);
    color:#000;
    z-index:9999;
    padding:8px 0;
}

.app-banner .container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    font-weight:600;
}

/* CLOSE BUTTON */
.close-btn{
    background:white;
    border:none;
    padding:2px 8px;
    border-radius:4px;
    font-size:14px;
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    top:45px; /* banner height */
    left:0;
    width:100%;
    z-index:9998;
    background:rgba(13,27,42,0.95);
    backdrop-filter:blur(10px);
    padding:12px 0;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.navbar-brand{
    font-size:26px;
    font-weight:800;
}

.nav-link{
    color:white !important;
    margin-left:15px;
    position:relative;
}

/* underline effect */
.nav-link::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:#ff9800;
    transition:0.3s;
}

.nav-link:hover::after{
    width:100%;
}

/* PAGE SPACE */
body{
    padding-top:110px;
    background:#f5f6fa;
}

/* MOBILE */
@media(max-width:768px){
    .app-banner .container{
        font-size:11px;
    }
    .navbar-brand{
        font-size:22px;
    }
}

</style>
</head>

<body>

<!-- ================= APP BANNER ================= -->
<div class="app-banner" id="banner">
  <div class="container">

    <div>
      📲 Install Diploma Engineers App for Notes & Updates
    </div>

    <div>
      <a href="https://your-app-link.com" class="btn btn-dark btn-sm">
        Install
      </a>

      <button class="close-btn" onclick="closeBanner()">
        ✖
      </button>
    </div>

  </div>
</div>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="#">
<span style="color:white;">Diploma</span>
<span style="color:#ffcc00;">Engineers</span>
</a>

<button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#">Notes</a></li>
<li class="nav-item"><a class="nav-link" href="#">Syllabus</a></li>
<li class="nav-item"><a class="nav-link" href="#">Result</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
</ul>

</div>

</div>

</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function closeBanner(){
    document.getElementById("banner").style.display = "none";
}
</script>

</body>
</html>
