<!DOCTYPE html>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* =====================================================
TOP DOWNLOAD BAR
===================================================== */

.top-bar{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    background:linear-gradient(90deg,#ff9800,#ff5722);

    color:white;

    z-index:99999;

    padding:8px 14px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:10px;

    box-shadow:0 3px 10px rgba(0,0,0,0.15);

}

.top-left{

    display:flex;

    align-items:center;

    gap:8px;

    font-size:13px;

    font-weight:500;

    overflow:hidden;

}

.top-left i{

    font-size:16px;

}

.top-text{

    white-space:nowrap;

    animation:slideText 12s linear infinite;

}

@keyframes slideText{

    0%{
        transform:translateX(100%);
    }

    100%{
        transform:translateX(-100%);
    }

}

.top-right{

    display:flex;

    align-items:center;

    gap:8px;

}

.install-btn{

    background:white;

    color:#ff5722;

    text-decoration:none;

    border:none;

    padding:6px 14px;

    border-radius:30px;

    font-size:12px;

    font-weight:600;

    transition:0.3s;

}

.install-btn:hover{

    background:#0d1b2a;

    color:white;

}

.close-btn{

    width:28px;

    height:28px;

    border:none;

    border-radius:50%;

    background:rgba(255,255,255,0.2);

    color:white;

    cursor:pointer;

    transition:0.3s;

}

.close-btn:hover{

    background:white;

    color:#ff5722;

}

/* =====================================================
NAVBAR
===================================================== */

.navbar{

    position:fixed;

    top:44px;

    left:0;

    width:100%;

    z-index:9999;

    background:#0d1b2a;

    padding:10px 0;

    box-shadow:0 5px 20px rgba(0,0,0,0.08);

}

.navbar .container{

    display:flex;

    align-items:center;

    justify-content:space-between;

}

/* =====================================================
LOGO
===================================================== */

.navbar-brand{

    display:flex;

    align-items:center;

    gap:10px;

    text-decoration:none;

}

.navbar-brand img{

    width:38px;

    height:38px;

    border-radius:10px;

    object-fit:cover;

}

.brand-text{

    color:white;

    font-size:18px;

    font-weight:700;

    white-space:nowrap;

}

.brand-text span{

    color:#ff9800;

}

/* =====================================================
NAV LINKS
===================================================== */

.navbar-nav{

    display:flex;

    align-items:center;

    gap:5px;

}

.nav-link{

    color:white !important;

    font-size:14px;

    font-weight:500;

    padding:10px 14px !important;

    border-radius:10px;

    transition:0.3s;

}

.nav-link:hover{

    background:rgba(255,255,255,0.08);

    color:#ff9800 !important;

}

/* =====================================================
TOGGLER
===================================================== */

.navbar-toggler{

    border:none;

    background:none;

    color:white;

    font-size:24px;

}

.navbar-toggler:focus{

    box-shadow:none;

}

/* =====================================================
BODY GAP
===================================================== */

body{

    padding-top:120px;

}

/* =====================================================
MOBILE UI
===================================================== */

@media(max-width:991px){

    .navbar{

        top:44px;

    }

    .navbar-collapse{

        background:#0d1b2a;

        padding:15px;

        border-radius:18px;

        margin-top:15px;

    }

    .navbar-nav{

        align-items:flex-start;

    }

    .nav-link{

        width:100%;

    }

}

@media(max-width:768px){

    .top-bar{

        padding:7px 10px;

    }

    .top-left{

        font-size:11px;

    }

    .install-btn{

        padding:5px 12px;

        font-size:11px;

    }

    .brand-text{

        font-size:15px;

    }

    .navbar-brand img{

        width:33px;

        height:33px;

    }

    body{

        padding-top:112px;

    }

}

</style>

</head>
