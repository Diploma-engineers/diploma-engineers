<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{

    margin:0;

    background:#f4f7fb;

    padding-top:95px;

}

/* =====================================================
TOPBAR
===================================================== */

#topbar{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    height:40px;

    background:#0d1b2a;

    display:flex;

    align-items:center;

    overflow:hidden;

    z-index:99999;

    border-bottom:1px solid rgba(255,255,255,0.08);

}

/* =====================================================
SLIDING TEXT
===================================================== */

.marquee{

    white-space:nowrap;

    color:white;

    font-size:12px;

    font-weight:500;

    display:inline-block;

    padding-left:100%;

    animation:marquee 20s linear infinite;

}

.marquee span{
    color:#ff9800;
    font-weight:600;
}

@keyframes marquee{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }

}

/* =====================================================
NAVBAR
===================================================== */

.custom-navbar{

    position:fixed;

    top:40px;

    left:0;

    width:100%;

    background:#0d1b2a;

    z-index:9999;

    padding:8px 0;

    transition:0.3s;

    box-shadow:0 3px 15px rgba(0,0,0,0.12);

}

/* =====================================================
SCROLL EFFECT
===================================================== */

.custom-navbar.scrolled{

    background:#08111f;

    padding:6px 0;

}

/* =====================================================
LOGO
===================================================== */

.navbar-brand{

    display:flex;

    align-items:center;

    gap:8px;

    font-size:18px;

    font-weight:700;

    text-decoration:none;

}

.logo-box{

    width:34px;
    height:34px;

    border-radius:10px;

    overflow:hidden;

}

.logo-box img{

    width:100%;
    height:100%;

    object-fit:cover;

}

.brand-white{
    color:white;
}

.brand-orange{
    color:#ff9800;
}

/* =====================================================
RIGHT MENU
===================================================== */

.navbar-collapse{
    justify-content:flex-end;
}

/* =====================================================
NAV LINKS
===================================================== */

.nav-link{

    color:white !important;

    font-size:13px;

    padding:8px 12px !important;

    border-radius:10px;

    margin-left:5px;

    transition:0.3s;

    display:flex;

    align-items:center;

    gap:6px;

}

.nav-link i{
    font-size:12px;
}

.nav-link:hover{

    background:rgba(255,255,255,0.08);

    color:#ff9800 !important;

}

.nav-link.active{

    background:#ff9800;

    color:white !important;

}

/* =====================================================
MENU BUTTON
===================================================== */

.navbar-toggler{

    background:white;

    border:none;

    padding:4px 8px;

    border-radius:8px;

}

.navbar-toggler:focus{
    box-shadow:none;
}

/* =====================================================
MOBILE MENU
===================================================== */

@media(max-width:991px){

    .navbar-collapse{

        background:#132235;

        padding:15px;

        border-radius:15px;

        margin-top:15px;

    }

    .nav-link{

        margin:5px 0;

    }

}

/* =====================================================
MOBILE FIX
===================================================== */

@media(max-width:768px){

    body{

        padding-top:88px;

    }

    .navbar-brand{

        font-size:16px;

    }

    .logo-box{

        width:30px;
        height:30px;

    }

    .marquee{

        font-size:11px;

    }

}

</style>

</head>
