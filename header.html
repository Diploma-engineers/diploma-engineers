<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f4f7fb;
    padding-top:120px;
}

/* =====================================================
TOP UPDATE BAR
===================================================== */

#topbar{

    position:fixed;
    top:0;
    left:0;

    width:100%;

    height:45px;

    display:flex;
    align-items:center;

    overflow:hidden;

    background:linear-gradient(135deg,#ff9800,#ff5722);

    color:white;

    z-index:99999;

    box-shadow:0 3px 12px rgba(0,0,0,0.15);

}

.marquee{

    white-space:nowrap;

    display:inline-block;

    padding-left:100%;

    animation:scrollText 20s linear infinite;

    font-size:14px;

    font-weight:500;

}

.marquee i{
    margin-right:8px;
}

@keyframes scrollText{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }

}

/* =====================================================
NAVBAR
===================================================== */

.custom-navbar{

    position:fixed;

    top:45px;

    left:0;

    width:100%;

    z-index:9999;

    background:rgba(13,27,42,0.96);

    backdrop-filter:blur(12px);

    padding:12px 0;

    transition:0.3s ease;

    box-shadow:0 4px 20px rgba(0,0,0,0.08);

}

/* NAVBAR SCROLL */

.custom-navbar.scrolled{

    background:#08111f;

    padding:8px 0;

}

/* LOGO */

.navbar-brand{

    display:flex;

    align-items:center;

    gap:12px;

    font-size:28px;

    font-weight:800;

}

.logo-box{

    width:50px;

    height:50px;

    border-radius:16px;

    background:linear-gradient(135deg,#ff9800,#ffcc00);

    display:flex;

    align-items:center;

    justify-content:center;

    color:white;

    font-size:22px;

    box-shadow:0 5px 15px rgba(255,152,0,0.35);

}

.brand-white{
    color:white;
}

.brand-yellow{
    color:#ffcc00;
}

/* MENU RIGHT SIDE */

.navbar-collapse{
    justify-content:flex-end;
}

/* NAV LINKS */

.nav-link{

    color:white !important;

    margin-left:10px;

    padding:11px 16px !important;

    border-radius:14px;

    display:flex;

    align-items:center;

    gap:8px;

    font-size:15px;

    font-weight:500;

    transition:0.3s;

}

.nav-link i{
    font-size:15px;
}

/* HOVER */

.nav-link:hover{

    background:rgba(255,255,255,0.08);

    color:#ffcc00 !important;

    transform:translateY(-2px);

}

/* ACTIVE LINK */

.nav-link.active{

    background:linear-gradient(135deg,#ff9800,#ff5722);

    color:white !important;

    box-shadow:0 5px 14px rgba(255,87,34,0.3);

}

/* MOBILE BUTTON */

.navbar-toggler{

    background:white;

    border:none;

    border-radius:12px;

    padding:8px 12px;

}

.navbar-toggler:focus{
    box-shadow:none;
}

/* MOBILE MENU */

@media(max-width:991px){

    .navbar-collapse{

        margin-top:18px;

        background:#10243d;

        padding:18px;

        border-radius:20px;

    }

    .nav-link{

        margin:6px 0;

    }

}

</style>

</head>

===================================================== */
