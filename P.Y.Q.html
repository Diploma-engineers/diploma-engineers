<thead>
<tr><th>Subject Name</th><th>Download</th></tr>
</thead>
<tbody id="tableData"></tbody>
</table>

<div class="pagination" id="pagination"></div>
</div>

<script>
const fullData = [
"Engineering Mathematics","Applied Physics","Applied Chemistry","Computer Programming","Workshop Practice",
"Thermal Engineering","Fluid Mechanics","Strength of Material","Machine Design","Surveying",
"Data Structure","Operating System","DBMS","Java Programming","Web Development",
"Electrical Machine","Digital Electronics","Control System","Microprocessor","Power System"
];

let currentPage = 1;
const rowsPerPage = 5;
let filteredData = fullData;

function displayTable(){
let start=(currentPage-1)*rowsPerPage;
let end=start+rowsPerPage;
let html="";
filteredData.slice(start,end).forEach(item=>{
html+=`<tr><td>${item}</td><td><a href='#' onclick='comingSoon(event)' class='download-btn'>Download</a></td></tr>`;
});
document.getElementById("tableData").innerHTML=html;
setupPagination();
}

function setupPagination(){
let pageCount=Math.ceil(filteredData.length/rowsPerPage);
let btns="";
for(let i=1;i<=pageCount;i++){
btns+=`<button onclick='changePage(${i})' class='${i===currentPage?"active":""}'>${i}</button>`;
}
document.getElementById("pagination").innerHTML=btns;
}

function changePage(p){currentPage=p;displayTable();}

document.getElementById("search").addEventListener("keyup",function(){
let val=this.value.toLowerCase();
filteredData=fullData.filter(item=>item.toLowerCase().includes(val));
currentPage=1;displayTable();
});

function comingSoon(e){e.preventDefault();alert("📄 PDF Coming Soon...");}

displayTable();
</script>
