<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PYQ - Diploma Engineers</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    padding-top:80px;
    background:#f4f7fb;
}

/* NAVBAR */
.navbar{
    background:#1d3557;
}
.navbar a{
    color:white !important;
}
.nav-link{
    margin-left:15px;
}

/* MAIN BOX */
.main-box{
    max-width:900px;
    margin:px auto;
    background:#fff;
    padding:25px;
    border-radius:px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* TITLE */
.title{
    text-align:center;
    color:#1d3557;
    font-weight:700;
}

/* SEARCH */
.search-box{
    width:100%;
    padding:10px;
    margin:20px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
.search-box:focus{
    border-color:#ff7b00;
    outline:none;
}

/* TABLE */
table{
    width:100%;
}
th{
    background:#1d3557;
    color:white;
    padding:10px;
}
td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

/* BUTTON */
.download-btn{
    background:#22c55e;
    color:white;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
}
.download-btn:hover{
    background:#16a34a;
}

/* PAGINATION */
.pagination{
    text-align:center;
    margin-top:20px;
}
.pagination button{
    margin:3px;
    padding:6px 12px;
    border:none;
    background:#ddd;
    border-radius:5px;
}
.pagination button.active{
    background:#1d3557;
    color:white;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<a class="navbar-brand" href="#">
<span style="font-weight:bold;">Diploma</span> 
<span style="color:yellow;font-weight:bold;">Engineers</span>
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="notes.html">Notes</a></li>
<li class="nav-item"><a class="nav-link active" href="#">PYQ</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
</ul>
</div>

</div>
</nav>

<!-- MAIN -->
<div class="main-box">

<h2 class="title">📚 Previous Year Questions</h2>

<input type="text" id="search" class="search-box" placeholder="🔍 Search Subject...">

<table>
<thead>
<tr>
<th>Subject Name</th>
<th>Download</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

<div class="pagination" id="pagination"></div>

</div>

<!-- SCRIPT -->
<script>

const fullData = [
"Engineering Mathematics","Applied Physics","Applied Chemistry","Computer Programming","Workshop Practice",
"Thermal Engineering","Fluid Mechanics","Strength of Material","Machine Design","Surveying",
"Data Structure","Operating System","DBMS","Java Programming","Web Development",
"Electrical Machine","Digital Electronics","Control System","Microprocessor","Power System"
];

let currentPage = 1;
const rowsPerPage = 5;
let filteredData = fullData;

function displayTable(){
let start=(currentPage-1)*rowsPerPage;
let end=start+rowsPerPage;

let html="";
filteredData.slice(start,end).forEach(item=>{
html+=`
<tr>
<td>${item}</td>
<td><a href="#" onclick="comingSoon(event)" class="download-btn">Download</a></td>
</tr>`;
});

document.getElementById("tableData").innerHTML=html;
setupPagination();
}

function setupPagination(){
let pageCount=Math.ceil(filteredData.length/rowsPerPage);
let btns="";

for(let i=1;i<=pageCount;i++){
btns+=`<button onclick="changePage(${i})" class="${i===currentPage?"active":""}">${i}</button>`;
}

document.getElementById("pagination").innerHTML=btns;
}

function changePage(p){
currentPage=p;
displayTable();
}

document.getElementById("search").addEventListener("keyup",function(){
let val=this.value.toLowerCase();
filteredData=fullData.filter(item=>item.toLowerCase().includes(val));
currentPage=1;
displayTable();
});

function comingSoon(e){
e.preventDefault();
alert("📄 PDF Coming Soon...");
}

displayTable();

</script>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

</body>
</html>
