<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diploma Engineers | Admit Card</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
    padding-top:80px;
    color:#0f172a;
}

/* =====================================================
MAIN SECTION
===================================================== */

.main-section{

    min-height:100vh;

    padding:40px 15px 60px;

}

/* =====================================================
CARD
===================================================== */

.admit-card-box{

    max-width:500px;

    margin:auto;

    background:#ffffff;

    border-radius:30px;

    padding:40px 30px;

    position:relative;

    overflow:hidden;

    box-shadow:0 15px 40px rgba(0,0,0,0.08);

}

.admit-card-box::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:6px;

    background:linear-gradient(90deg,#ff9800,#ff5722,#2563eb);

}

/* =====================================================
ICON
===================================================== */

.icon-box{

    width:100px;
    height:100px;

    margin:auto;

    border-radius:28px;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    display:flex;

    align-items:center;
    justify-content:center;

    color:white;

    font-size:40px;

    box-shadow:0 12px 30px rgba(37,99,235,0.25);

    margin-bottom:25px;

}

/* =====================================================
TITLE
===================================================== */

.admit-card-box h2{

    text-align:center;

    font-size:34px;

    font-weight:700;

    color:#0d1b2a;

    margin-bottom:10px;

}

.admit-card-box p{

    text-align:center;

    color:#64748b;

    font-size:15px;

    line-height:1.8;

}

/* =====================================================
INPUT
===================================================== */

.input-box{

    margin-top:30px;

}

.input-box label{

    display:block;

    margin-bottom:10px;

    font-size:14px;

    font-weight:600;

    color:#334155;

}

.input-box input{

    width:100%;

    padding:16px 18px;

    border-radius:16px;

    border:1px solid #cbd5e1;

    outline:none;

    font-size:15px;

    transition:0.3s;

    background:#f8fafc;

}

.input-box input:focus{

    border-color:#2563eb;

    background:white;

    box-shadow:0 0 0 4px rgba(37,99,235,0.12);

}

/* =====================================================
BUTTON
===================================================== */

.download-btn{

    width:100%;

    margin-top:25px;

    padding:16px;

    border:none;

    border-radius:16px;

    background:linear-gradient(135deg,#22c55e,#16a34a);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    box-shadow:0 12px 25px rgba(34,197,94,0.25);

}

.download-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 18px 35px rgba(34,197,94,0.35);

}

/* =====================================================
EXAMPLE
===================================================== */

.sample{

    margin-top:22px;

    background:#eff6ff;

    border:1px dashed #93c5fd;

    color:#2563eb;

    padding:14px;

    border-radius:14px;

    text-align:center;

    font-size:14px;

    font-weight:600;

}

/* =====================================================
INFO BOX
===================================================== */

.info-box{

    margin-top:25px;

    background:#fff7ed;

    border:1px solid #fed7aa;

    padding:16px;

    border-radius:16px;

    font-size:14px;

    color:#9a3412;

    line-height:1.8;

}

/* =====================================================
MOBILE
===================================================== */

@media(max-width:768px){

    .main-section{

        padding:25px 12px 50px;

    }

    .admit-card-box{

        padding:32px 20px;

        border-radius:24px;

    }

    .icon-box{

        width:85px;
        height:85px;

        font-size:34px;

    }

    .admit-card-box h2{

        font-size:28px;

    }

    .download-btn{

        font-size:15px;

    }

}

</style>

</head>

<body>

<!-- =====================================================
HEADER
===================================================== -->

<div id="header"></div>

<!-- =====================================================
MAIN
===================================================== -->

<section class="main-section">

<div class="admit-card-box">

<div class="icon-box">
<i class="fa-solid fa-file-arrow-down"></i>
</div>

<h2>BTEUP Admit Card</h2>

<p>
Download your diploma admit card instantly using enrollment number.
</p>

<div class="input-box">

<label>Enrollment Number</label>

<input type="text"
id="enrollment"
placeholder="Enter Enrollment Number">

</div>

<button class="download-btn" onclick="downloadAdmitCard()">

<i class="fa-solid fa-download"></i>

Download Admit Card

</button>

<div class="sample">

Example: E21222532500063

</div>

<div class="info-box">

📌 Make sure your enrollment number is correct before downloading the admit card.

</div>

</div>

</section>

<!-- =====================================================
FOOTER
===================================================== -->

<div id="footer"></div>

<!-- =====================================================
HEADER / FOOTER LOAD
===================================================== -->

<script>

fetch("header.html")
.then(res => res.text())
.then(data => {

document.getElementById("header").innerHTML = data;

});

fetch("footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data;

});

</script>

<!-- =====================================================
DOWNLOAD SCRIPT
===================================================== -->

<script>

function downloadAdmitCard(){

let enroll = document.getElementById("enrollment").value.trim();

if(enroll === ""){

alert("Please enter enrollment number");

return;

}

let url =
"https://bteup.ac.in/ESeva/Student/AdmitCard.aspx?EnrollNumber="
+ encodeURIComponent(enroll);

window.open(url,"_blank");

}

</script>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
    </html>
