<style>

/* =====================================================
GLOBAL
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f4f7fb;
    padding-top:74px;
}

/* =====================================================
TOPBAR
===================================================== */

#topbar{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    height:34px;

    background:#0d1b2a;

    overflow:hidden;

    display:flex;

    align-items:center;

    z-index:99999;

    border-bottom:1px solid rgba(255,255,255,0.06);

}

/* =====================================================
SLIDING TEXT
===================================================== */

.marquee{

    white-space:nowrap;

    color:white;

    font-size:11px;

    font-weight:500;

    padding-left:100%;

    animation:marquee 18s linear infinite;

}

.marquee span{
    color:#ff9800;
    font-weight:600;
}

@keyframes marquee{

    0%{
        transform:translateX(0%);
    }

    100%{
        transform:translateX(-100%);
    }

}

/* =====================================================
NAVBAR
===================================================== */

.custom-navbar{

    position:fixed;

    top:34px;

    left:0;

    width:100%;

    background:#0d1b2a;

    z-index:9999;

    padding:7px 0;

    transition:0.3s ease;

    box-shadow:0 3px 14px rgba(0,0,0,0.12);

}

.custom-navbar.scrolled{

    background:#08111f;

    padding:5px 0;

}

/* =====================================================
LOGO
===================================================== */

.navbar-brand{

    display:flex;

    align-items:center;

    gap:7px;

    font-size:16px;

    font-weight:700;

    text-decoration:none;

}

.logo-box{

    width:26px;
    height:26px;

    border-radius:7px;

    overflow:hidden;

    flex-shrink:0;

}

.logo-box img{

    width:100%;
    height:100%;

    object-fit:cover;

}

.brand-white{
    color:white;
}

.brand-orange{
    color:#ff9800;
}

/* =====================================================
NAV LINKS
===================================================== */

.navbar-collapse{
    justify-content:flex-end;
}

.nav-link{

    color:white !important;

    font-size:12px;

    padding:7px 10px !important;

    margin-left:4px;

    border-radius:8px;

    display:flex;

    align-items:center;

    gap:5px;

    transition:0.3s;

}

.nav-link i{
    font-size:11px;
}

.nav-link:hover{

    background:rgba(255,255,255,0.08);

    color:#ff9800 !important;

}

.nav-link.active{

    background:#ff9800;

    color:white !important;

}

/* =====================================================
MENU BUTTON
===================================================== */

.navbar-toggler{

    background:white;

    border:none;

    padding:3px 7px;

    border-radius:7px;

}

.navbar-toggler:focus{
    box-shadow:none;
}

/* =====================================================
MOBILE MENU
===================================================== */

@media(max-width:991px){

    .navbar-collapse{

        margin-top:12px;

        background:#132235;

        padding:14px;

        border-radius:14px;

    }

    .nav-link{

        margin:4px 0;

    }

}

/* =====================================================
MOBILE FIX
===================================================== */

@media(max-width:768px){

    body{
        padding-top:72px;
    }

    .navbar-brand{
        font-size:14px;
    }

    .logo-box{
        width:23px;
        height:23px;
    }

    .marquee{
        font-size:10px;
    }

    .nav-link{
        font-size:12px;
    }

}

</style>

</head>

/* =====================================================
NAVBAR SCROLL EFFECT
===================================================== */

    const navbar = document.querySelector(".custom-navbar");

    navbar.classList.toggle("scrolled", window.scrollY > 20);
