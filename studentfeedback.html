<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Feedback - Diploma Engineers</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* =====================================================
BODY
===================================================== */

body{

    margin:0;

    font-family:'Poppins',sans-serif;

    background:#f4f7fb;

}

/* =====================================================
HERO SECTION
===================================================== */

.feedback-hero{

    background:linear-gradient(135deg,#0d1b2a,#1b263b);

    padding:120px 20px 70px;

    text-align:center;

    color:white;

    border-radius:0 0 35px 35px;

}

.feedback-hero h1{

    font-size:42px;

    font-weight:700;

    margin-bottom:12px;

}

.feedback-hero p{

    max-width:650px;

    margin:auto;

    color:#cbd5e1;

    font-size:15px;

    line-height:1.7;

}

/* =====================================================
FEEDBACK CARD
===================================================== */

.feedback-wrapper{

    margin-top:-40px;

    margin-bottom:60px;

}

.feedback-card{

    background:white;

    border-radius:28px;

    padding:35px;

    max-width:650px;

    margin:auto;

    box-shadow:0 15px 40px rgba(0,0,0,0.08);

    border:1px solid rgba(0,0,0,0.05);

    position:relative;

    overflow:hidden;

}

/* TOP LINE */

.feedback-card::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:5px;

    background:linear-gradient(90deg,#ff9800,#ff5722);

}

/* =====================================================
FORM TITLE
===================================================== */

.form-title{

    text-align:center;

    margin-bottom:25px;

}

.form-title h3{

    font-size:28px;

    font-weight:700;

    color:#0d1b2a;

}

.form-title p{

    color:#64748b;

    font-size:14px;

}

/* =====================================================
INPUTS
===================================================== */

.input-group-custom{

    margin-bottom:18px;

}

.input-group-custom label{

    font-size:14px;

    font-weight:600;

    color:#334155;

    margin-bottom:8px;

    display:block;

}

.feedback-card input,
.feedback-card textarea,
.feedback-card select{

    width:100%;

    padding:14px 16px;

    border-radius:14px;

    border:1px solid #dbe2ea;

    outline:none;

    background:#f8fafc;

    transition:0.3s;

    font-size:14px;

}

.feedback-card input:focus,
.feedback-card textarea:focus,
.feedback-card select:focus{

    border-color:#2563eb;

    background:white;

    box-shadow:0 0 12px rgba(37,99,235,0.12);

}

/* =====================================================
BUTTON
===================================================== */

.submit-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:14px;

    background:linear-gradient(135deg,#22c55e,#16a34a);

    color:white;

    font-size:15px;

    font-weight:600;

    transition:0.3s;

}

.submit-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 12px 24px rgba(34,197,94,0.25);

}

/* =====================================================
NOTE
===================================================== */

.feedback-note{

    margin-top:18px;

    text-align:center;

    font-size:13px;

    color:#64748b;

}

/* =====================================================
MOBILE UI
===================================================== */

@media(max-width:768px){

    .feedback-hero{

        padding:105px 18px 55px;

    }

    .feedback-hero h1{

        font-size:32px;

    }

    .feedback-hero p{

        font-size:14px;

    }

    .feedback-card{

        padding:25px 20px;

        border-radius:22px;

    }

    .form-title h3{

        font-size:24px;

    }

}

</style>

</head>

<body>

<!-- =====================================================
HEADER
===================================================== -->

<div id="header"></div>

<script>

fetch("header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
});

</script>

<!-- =====================================================
HERO
===================================================== -->

<section class="feedback-hero">

<h1>Student Feedback</h1>

<p>

Share your experience, suggestions and feedback with Diploma Engineers platform. Your feedback helps us improve better for students.

</p>

</section>

<!-- =====================================================
FEEDBACK FORM
===================================================== -->

<div class="container feedback-wrapper">

<div class="feedback-card">

<div class="form-title">

<h3>Send Your Feedback</h3>

<p>
We value your opinion and suggestions
</p>

</div>

<form action="https://formsubmit.co/astar22072006@gmail.com" method="POST">

<!-- Hidden -->

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_template" value="table">

<!-- Name -->

<div class="input-group-custom">

<label>
Your Name
</label>

<input type="text"
name="name"
placeholder="Enter your name"
required>

</div>

<!-- Email -->

<div class="input-group-custom">

<label>
Email Address
</label>

<input type="email"
name="email"
placeholder="Enter your email"
required>

</div>

<!-- Rating -->

<div class="input-group-custom">

<label>
Rate Our Platform
</label>

<select name="rating" required>

<option value="">
Select Rating
</option>

<option>
Excellent
</option>

<option>
Good
</option>

<option>
Average
</option>

<option>
Poor
</option>

</select>

</div>

<!-- Feedback -->

<div class="input-group-custom">

<label>
Your Feedback
</label>

<textarea name="message"
rows="5"
placeholder="Write your feedback here..."
required></textarea>

</div>

<!-- Button -->

<button type="submit" class="submit-btn">

<i class="fa-solid fa-paper-plane"></i>

Submit Feedback

</button>

</form>

<!-- Note -->

<div class="feedback-note">

⚡ Your feedback helps us improve the platform experience for diploma students.

</div>

</div>

</div>

<!-- =====================================================
FOOTER
===================================================== -->

<div id="footer"></div>

<script>

fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});

</script>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
    </html>
