<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hindi TGT CBT Mock Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef2f7;
}

/* HEADER */

.header{
background:#0f172a;
color:#fff;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.header h1{
font-size:20px;
}

.timer{
font-size:20px;
font-weight:700;
color:#facc15;
}

/* LOGIN */

.login-box{
width:90%;
max-width:420px;
background:#fff;
margin:40px auto;
padding:30px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#0f172a;
}

.login-box input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
outline:none;
}

.login-box button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:#fff;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
background:#1d4ed8;
}

/* MAIN */

.container{
display:none;
height:calc(100vh - 70px);
}

/* LEFT */

.left{
flex:1;
background:#fff;
padding:20px;
overflow:auto;
}

/* RIGHT */

.right{
width:210px;
background:#f8fafc;
padding:15px;
border-left:2px solid #ddd;
overflow:auto;
}

/* QUESTION */

.question-box{
font-size:20px;
font-weight:600;
line-height:1.7;
margin-bottom:20px;
}

.question-box img{
width:100%;
max-width:350px;
margin-top:15px;
border-radius:12px;
border:1px solid #ddd;
}

/* OPTIONS */

.option{
display:block;
background:#f1f5f9;
padding:15px;
margin:12px 0;
border-radius:12px;
cursor:pointer;
transition:.3s;
font-size:16px;
border:2px solid transparent;
}

.option:hover{
background:#dbeafe;
transform:translateY(-2px);
}

.option.selected{
border-color:#2563eb;
background:#dbeafe;
}

.option input{
margin-right:10px;
}

/* BUTTONS */

.buttons{
margin-top:20px;
}

.buttons button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.next{
background:#2563eb;
color:#fff;
}

.review{
background:#f97316;
color:#fff;
}

.submit{
background:#dc2626;
color:#fff;
}

.buttons button:hover{
opacity:.9;
}

/* PALETTE */

.palette{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;
}

.palette button{
width:42px;
height:42px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.palette button:hover{
transform:scale(1.05);
}

.notattempted{
background:#cbd5e1;
}

.attempted{
background:#16a34a;
color:#fff;
}

.marked{
background:#f97316;
color:#fff;
}

/* RESULT */

.result{
display:none;
padding:25px;
text-align:center;
}

.result h1{
margin-bottom:20px;
color:#0f172a;
}

.result button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
font-weight:600;
cursor:pointer;
}

.result table{
width:100%;
border-collapse:collapse;
margin-top:25px;
background:#fff;
overflow:hidden;
border-radius:15px;
}

.result th{
background:#2563eb;
color:#fff;
padding:14px;
border:1px solid #ddd;
}

.result td{
padding:12px;
border:1px solid #ddd;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}

.notdone{
color:#555;
font-weight:bold;
}

#performanceBox{
margin-top:20px;
}

/* MOBILE */

@media(max-width:768px){

.container{
flex-direction:row;
height:auto;
}

.left{
width:72%;
padding:10px;
}

.right{
width:28%;
padding:10px;
}

.palette{
grid-template-columns:repeat(2,1fr);
gap:6px;
}

.palette button{
width:100%;
height:34px;
font-size:12px;
}

.question-box{
font-size:18px;
}

.buttons button{
padding:10px 12px;
font-size:12px;
margin:3px;
}

.header h1{
font-size:14px;
}

.timer{
font-size:15px;
}

}

/* PRINT */

@media print{

.header,
.buttons,
.right,
.login-box,
.result button{
display:none;
}

body{
background:#fff;
}

.result{
display:block;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>🎯 Hindi TGT CBT Mock Test</h1>

<div class="timer">
⏰ <span id="time">3600</span>s
</div>

</div>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<input type="text" id="name" placeholder="Enter Name">

<input type="number" id="mobile" placeholder="Enter Mobile Number">

<button onclick="startTest()">
Start Test
</button>

</div>

<!-- TEST -->

<div class="container" id="testBox">

<!-- LEFT -->

<div class="left">

<div id="qno"></div>

<div class="question-box" id="question"></div>

<div id="options"></div>

<div class="buttons">

<button class="review" onclick="markReview()">
📌 Mark Review
</button>

<button class="next" onclick="nextQ()">
➡ Next
</button>

<button class="submit" onclick="submitTest()">
✅ Submit
</button>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<h3>📋 Questions</h3>

<div class="palette" id="palette"></div>

</div>

</div>

<!-- RESULT -->

<div class="result" id="resultBox">

<h1 id="scoreBox"></h1>

<div id="summary"></div>

<div id="performanceBox"></div>

<div style="overflow-x:auto;">

<table>

<thead>

<tr>

<th>Q.No</th>
<th>Your Answer</th>
<th>Correct Answer</th>
<th>Status</th>

</tr>

</thead>

<tbody id="resultTable"></tbody>

</table>

</div>

<button onclick="downloadPDF()">
📄 Download PDF
</button>

<button onclick="shareResult()">
📤 Share Result
</button>

<button onclick="location.reload()">
🔄 Restart Test
</button>

</div>

/* VARIABLES */

let current=0;
let answers=[];
let marked=[];
let time=3600;
let timer;

/* START TEST */

function startTest(){

let name=document.getElementById("name").value.trim();
let mobile=document.getElementById("mobile").value.trim();

if(name=="" || mobile==""){
alert("Please Fill Details");
return;
}

if(!/^[6-9]\d{9}$/.test(mobile)){
alert("Enter Valid Mobile Number");
return;
}

document.getElementById("loginBox").style.display="none";

document.getElementById("testBox").style.display="flex";

buildPalette();

loadQ();

timer=setInterval(()=>{

time--;

document.getElementById("time").innerText=time;

if(time<=0){

submitTest();

}

},1000);

}

/* LOAD QUESTION */

function loadQ(){

let q=questions[current];

document.getElementById("qno").innerHTML=
`<h2>Question ${current+1}</h2>`;

document.getElementById("question").innerHTML=`

<div>${q.q}</div>

${q.img ? `<img src="${q.img}">` : ""}

`;

let html="";

q.opt.forEach((o,i)=>{

html+=`

<label class="option ${answers[current]==i ? 'selected' : ''}">

<input type="radio"
name="opt"
value="${i}"
${answers[current]==i ? "checked" : ""}
onclick="selectOption(${i})">

${o}

</label>

`;

});

document.getElementById("options").innerHTML=html;

}

/* SELECT */

function selectOption(i){

answers[current]=i;

updatePalette();

loadQ();

}

/* NEXT */

function nextQ(){

if(current<questions.length-1){

current++;

}
else{

current=0;

}

loadQ();

}

/* REVIEW */

function markReview(){

marked[current]=true;

updatePalette();

}

/* BUILD PALETTE */

function buildPalette(){

let html="";

for(let i=0;i<100;i++){

html+=`

<button
onclick="goQ(${i})"
id="p${i}"
class="notattempted">

${i+1}

</button>

`;

}

document.getElementById("palette").innerHTML=html;

updatePalette();

}

/* UPDATE */

function updatePalette(){

for(let i=0;i<100;i++){

let btn=document.getElementById("p"+i);

if(i>=questions.length){

btn.style.display="none";
continue;

}

if(marked[i]){

btn.className="marked";

}
else if(answers[i]!=null){

btn.className="attempted";

}
else{

btn.className="notattempted";

}

}

}

/* GO QUESTION */

function goQ(i){

if(i<questions.length){

current=i;

loadQ();

}

}

/* SUBMIT */

function submitTest(){

clearInterval(timer);

let correct=0;
let wrong=0;
let attempted=0;

questions.forEach((q,i)=>{

if(answers[i]!=null){

attempted++;

if(answers[i]==q.ans){

correct++;

}
else{

wrong++;

}

}

});

let score=(correct-(wrong*0.25)).toFixed(2);

document.getElementById("testBox").style.display="none";

document.getElementById("resultBox").style.display="block";

document.getElementById("scoreBox").innerHTML=
`🏆 Score : ${score}`;

/* SUMMARY */

document.getElementById("summary").innerHTML=`

<h2 style="margin-bottom:15px;">
📊 Result Summary
</h2>

<p><b>Total Questions :</b> ${questions.length}</p>

<p><b>Attempted :</b> ${attempted}</p>

<p><b>Correct :</b> ${correct}</p>

<p><b>Wrong :</b> ${wrong}</p>

`;

/* PERFORMANCE */

let percentage=(correct/questions.length)*100;

let performance="";
let bg="";

if(percentage>=85){

performance="🏆 EXCELLENT PERFORMANCE";
bg="#bbf7d0";

}
else if(percentage>=60){

performance="👍 GOOD PERFORMANCE";
bg="#fde68a";

}
else{

performance="📚 NEED IMPROVEMENT";
bg="#fecaca";

}

document.getElementById("performanceBox").innerHTML=`

<div style="
background:${bg};
padding:20px;
border-radius:15px;
font-size:18px;
font-weight:600;
">

${performance}

<br><br>

📈 Percentage : ${percentage.toFixed(2)}%

</div>

`;

/* RESULT TABLE */

let table="";

questions.forEach((q,i)=>{

let userAns=
answers[i]!=null
? q.opt[answers[i]]
: "Not Attempted";

let correctAns=q.opt[q.ans];

let status="";

if(answers[i]==null){

status=`<span class="notdone">
⚪ Not Attempted
</span>`;

}
else if(answers[i]==q.ans){

status=`<span class="correct">
✅ Correct
</span>`;

}
else{

status=`<span class="wrong">
❌ Wrong
</span>`;

}

table+=`

<tr>

<td>${i+1}</td>
<td>${userAns}</td>
<td>${correctAns}</td>
<td>${status}</td>

</tr>

`;

});

document.getElementById("resultTable").innerHTML=table;

}

/* PDF */

function downloadPDF(){

window.print();

}

/* SHARE */

function shareResult(){

let score=document.getElementById("scoreBox").innerText;

let text=`
🎯 Hindi TGT CBT Mock Test Result

${score}

🚀 Powered By Diploma Engineers
`;

if(navigator.share){
