<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Mock Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#eef2f7;}
.header{background:#1e293b;color:#fff;padding:10px;display:flex;justify-content:space-between;}
.container{display:flex;height:90vh;}
.left{flex:3;padding:20px;background:#fff;}
.right{flex:1;background:#f1f5f9;padding:10px;overflow:auto;}
.timer{color:red;font-weight:bold;}
.palette button{width:40px;height:40px;margin:5px;border:none;border-radius:5px;}
.attempted{background:green;color:#fff;}
.notattempted{background:#ddd;}
.review{background:orange;}
.option{display:block;margin:10px 0;}
.result{text-align:center;padding:20px;}
.correct{color:green;}
.wrong{color:red;}
button{padding:10px;margin:5px;}
</style>
</head>

<body>

<div class="header">
<div>🎯 CBT Mock Test</div>
<div class="timer">Time: <span id="time">1200</span></div>
</div>

<!-- LOGIN -->
<div id="login" style="text-align:center;padding:20px;">
<input id="name" placeholder="Name"><br>
<input id="mobile" placeholder="Mobile"><br>
<button onclick="startTest()">Start Test</button>
</div>

<!-- TEST -->
<div class="container" id="test" style="display:none;">
<div class="left">
<h3 id="qno"></h3>
<div id="question"></div>
<div id="options"></div>

<button onclick="markReview()">Mark Review</button>
<button onclick="nextQ()">Next</button>
<button onclick="submitTest()">Submit</button>
</div>

<div class="right">
<h4>Questions</h4>
<div id="palette"></div>
</div>
</div>

<!-- RESULT -->
<div id="result" class="result" style="display:none;">
<h2 id="score"></h2>
<div id="summary"></div>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="shareWhatsApp()">Share WhatsApp</button>
</div>

<script>
emailjs.init("0v2VDjb1-LCLKMAaA");

let user={},time=1200,timer;
let current=0;
let answers=[],marks=[];
let resultData={};

// Questions
let questions=[];
for(let i=0;i<20;i++){
 let a=Math.floor(Math.random()*20);
 let b=Math.floor(Math.random()*20);
 let ans=a+b;

 questions.push({
  q:`${a}+${b}=?`,
  opt:[ans-1,ans,ans+1,ans+2],
  ans:1
 });
}

function startTest(){
 user.name=name.value;
 user.mobile=mobile.value;

 if(!user.name || !user.mobile){
  alert("Fill details");
  return;
 }

 emailjs.send("service_7tu7wrc","template_dv8cb7o",user);

 login.style.display="none";
 test.style.display="flex";

 loadQ();
 buildPalette();

 timer=setInterval(()=>{
  time--;
  timeSpan.innerText=time;
  if(time<=0) submitTest();
 },1000);
}

function loadQ(){
 let q=questions[current];
 qno.innerText="Q"+(current+1);
 question.innerText=q.q;

 let html="";
 q.opt.forEach((o,i)=>{
  html+=`<label class="option">
  <input type="radio" name="opt" value="${i}" ${answers[current]==i?"checked":""}> ${o}</label>`;
 });

 options.innerHTML=html;
}

function nextQ(){
 let sel=document.querySelector("input[name=opt]:checked");
 if(sel) answers[current]=parseInt(sel.value);

 current++;
 if(current>=questions.length) current=0;

 updatePalette();
 loadQ();
}

function markReview(){
 marks[current]=true;
 updatePalette();
}

function buildPalette(){
 let html="";
 for(let i=0;i<questions.length;i++){
  html+=`<button onclick="goQ(${i})" id="p${i}" class="notattempted">${i+1}</button>`;
 }
 palette.innerHTML=html;
}

function updatePalette(){
 for(let i=0;i<questions.length;i++){
  let btn=document.getElementById("p"+i);

  if(marks[i]) btn.className="review";
  else if(answers[i]!=null) btn.className="attempted";
  else btn.className="notattempted";
 }
}

function goQ(i){
 current=i;
 loadQ();
}

function submitTest(){
 clearInterval(timer);

 let score=0,neg=0,attempt=0,correct=0,wrong=0;

 questions.forEach((q,i)=>{
  let ua=answers[i];

  if(ua!=null) attempt++;

  if(ua===q.ans){
   score++; correct++;
  }else{
   if(ua!=null){ neg+=0.25; wrong++; }
  }
 });

 let final=(score-neg).toFixed(2);

 let rank;
 if(final>=18) rank="Topper 🏆";
 else if(final>=15) rank="Excellent ⭐";
 else if(final>=10) rank="Good 👍";
 else rank="Needs Improvement";

 resultData={score:final,attempt,correct,wrong,rank};

 test.style.display="none";
 result.style.display="block";

 scoreBox.innerText=`Score: ${final} | ${rank}`;
 summary.innerHTML=`Attempted: ${attempt}<br>Correct: ${correct}<br>Wrong: ${wrong}`;
}

// PDF
function downloadPDF(){
 const {jsPDF}=window.jspdf;
 let doc=new jsPDF();

 doc.text("CBT Report Card",10,10);
 doc.text(`Name: ${user.name}`,10,20);
 doc.text(`Mobile: ${user.mobile}`,10,27);
 doc.text(`Score: ${resultData.score}`,10,35);
 doc.text(`Rank: ${resultData.rank}`,10,42);

 let y=55;

 questions.forEach((q,i)=>{
  if(y>270){doc.addPage();y=10;}

  doc.setTextColor(0,0,0);
  doc.text(`Q${i+1}: ${q.q}`,10,y);
  y+=6;

  let ua=answers[i];

  q.opt.forEach((opt,j)=>{
   if(j===q.ans) doc.setTextColor(0,150,0);
   else if(j===ua) doc.setTextColor(255,0,0);
   else doc.setTextColor(0,0,0);

   doc.text(`- ${opt}`,15,y);
   y+=5;
  });

  y+=3;
 });

 doc.save("CBT_Result.pdf");

 // email result
 emailjs.send("service_7tu7wrc","template_dv8cb7o",{
  name:user.name,
  mobile:user.mobile,
  score:resultData.score,
  rank:resultData.rank
 });
}

// WhatsApp
function shareWhatsApp(){
 let msg=`My Score: ${resultData.score} | Rank: ${resultData.rank}`;
 window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// elements
const name=document.getElementById("name");
const mobile=document.getElementById("mobile");
const login=document.getElementById("login");
const test=document.getElementById("test");
const result=document.getElementById("result");
const qno=document.getElementById("qno");
const question=document.getElementById("question");
const options=document.getElementById("options");
const palette=document.getElementById("palette");
const timeSpan=document.getElementById("time");
const scoreBox=document.getElementById("score");
const summary=document.getElementById("summary");
</script>

</body>
</html>
