<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEECUP CBT TEST</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#efefef;
}

/* LOGIN PAGE */

#loginPage{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
}

.login-box{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.3);
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
    color:#123d72;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-box input,
.input-box select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#123d72;
    color:#fff;
    border:none;
    cursor:pointer;
    font-size:18px;
    border-radius:5px;
}

/* TEST PAGE */

#testPage{
    display:none;
}

.topbar{
    background:#ffffff;
    text-align:center;
    padding:15px;
    border-bottom:2px solid #ccc;
}

.topbar h1{
    color:#123d72;
    font-size:40px;
}

.paper{
    margin-top:10px;
    font-size:22px;
    font-weight:bold;
    color:#444;
}

.main{
    display:flex;
    gap:15px;
    padding:10px;
}

.left{
    width:75%;
}

.right{
    width:25%;
}

.top-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:18px;
}

.timer{
    color:red;
    font-weight:bold;
}

.section-tabs{
    background:#fff;
    border:1px solid #ccc;
    padding:10px;
}

.section-tabs button{
    padding:10px 18px;
    border:none;
    cursor:pointer;
    margin-right:5px;
    color:#fff;
    font-weight:bold;
}

.math{
    background:#ef4444;
}

.physics,
.chemistry{
    background:#6b7280;
}

.question-box{
    background:#fff;
    border:1px solid #ccc;
}

.question-header{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #ccc;
    font-weight:bold;
}

.question-area{
    padding:20px;
    min-height:300px;
}

.question-text{
    font-size:28px;
    margin-bottom:30px;
}

.option{
    display:block;
    margin-bottom:20px;
    font-size:24px;
}

.footer-buttons{
    border-top:1px solid #ccc;
    padding:15px;
    text-align:center;
}

.footer-buttons button{
    padding:12px 20px;
    margin:5px;
    border:none;
    cursor:pointer;
    color:#fff;
    font-weight:bold;
}

.save-prev{
    background:#ef4444;
}

.review-next{
    background:#f59e0b;
}

.clear-btn{
    background:#6b7280;
}

.save-next{
    background:#22c55e;
}

.submit-btn{
    background:#123d72;
}

.palette-box{
    background:#fff;
    border:1px solid #ccc;
    padding:15px;
    margin-bottom:15px;
}

.palette{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    max-height:350px;
    overflow-y:auto;
}

.qbtn{
    width:45px;
    height:45px;
    border:1px solid #999;
    cursor:pointer;
    font-weight:bold;
    background:#f3f4f6;
}

.legend-box{
    background:#fff;
    border:1px solid #ccc;
    padding:15px;
}

.legend{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.legend-color{
    width:25px;
    height:25px;
    margin-right:10px;
}

@media(max-width:900px){

.main{
    flex-direction:column;
}

.left,
.right{
    width:100%;
}

.question-text{
    font-size:20px;
}

.option{
    font-size:18px;
}

.login-box{
    width:95%;
}

}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<h1>JEECUP CBT LOGIN</h1>

<div class="input-box">
<label>Full Name</label>
<input type="text" id="name">
</div>

<div class="input-box">
<label>Mobile Number</label>
<input type="number" id="mobile">
</div>


<button class="login-btn" onclick="startTest()">
START TEST
</button>

</div>

</div>


<!-- TEST PAGE -->

<div id="testPage">

<div class="topbar">

<h1>DIPOMA ENGINEERS ONLINE TEST</h1>

<div class="paper">
PAPER : JEECUP Entrance Exam - Hindi
</div>

</div>

<div class="main">

<div class="left">

<div class="top-info">

<div>
Welcome : <span id="studentName"></span>
</div>

<div class="timer">
REMAINING TIME : <span id="time">02:30:00</span>
</div>

</div>

<div class="section-tabs">

<button class="math">MATHEMATICS</button>
<button class="physics">PHYSICS</button>
<button class="chemistry">CHEMISTRY</button>

</div>

<div class="question-box">

<div class="question-header">

<div>
Question No. <span id="qno">1</span>
</div>

<div>
Correct Marks : 4 Negative Mark : <span style="color:red">1</span>
</div>

</div>

<div class="question-area">

<div class="question-text" id="questionText">
Loading...
</div>

<div id="optionsBox"></div>

</div>

<div class="footer-buttons">

<button class="save-prev" onclick="prevQuestion()">
SAVE & PREV
</button>

<button class="review-next" onclick="markForReview()">
MARK FOR REVIEW & NEXT
</button>

<button class="clear-btn" onclick="clearAnswer()">
CLEAR RESPONSE
</button>

<button class="save-next" onclick="saveAndNext()">
SAVE & NEXT
</button>

<button class="submit-btn" onclick="submitTest()">
SUBMIT TEST
</button>

</div>

</div>

</div>

<div class="right">

<div class="palette-box">

<div class="palette" id="palette"></div>

</div>

<div class="legend-box">

<h3 style="margin-bottom:15px;">LEGENDS</h3>

<div class="legend">
<div class="legend-color" style="background:#f3f4f6;border:1px solid #999;"></div>
Not Visited
</div>

<div class="legend">
<div class="legend-color" style="background:red;"></div>
Not Answered
</div>

<div class="legend">
<div class="legend-color" style="background:#22c55e;"></div>
Answered
</div>

<div class="legend">
<div class="legend-color" style="background:#facc15;"></div>
Marked For Review
</div>

</div>

</div>

</div>

</div>

<script>

function startTest(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let email = document.getElementById("email").value;
let city = document.getElementById("city").value;

if(name=="" || mobile=="" || email=="" || city==""){

alert("Please Fill All Details");
return;

}

/*
IMPORTANT:

DIRECT EMAIL SEND JAVASCRIPT SE POSSIBLE NAHI HOTA.

REAL EMAIL SEND KARNE KE LIYE:
1. PHP BACKEND
2. NODEJS SERVER
3. FORMSPREE / EMAILJS

USE KARNA HOGA.

ABHI YE DATA CONSOLE ME SAVE HOGA.
*/

console.log({

name,
mobile,
email,
city

});

document.getElementById("studentName").innerText = name;

document.getElementById("loginPage").style.display = "none";

document.getElementById("testPage").style.display = "block";

startTimer();

}

const questions = [

{
question:"हाइड्रोजन की खोज किसके द्वारा की गई थी ?",
options:[
"चार्ल्स",
"केवेन्डिश",
"प्रीस्टले",
"बॉयल"
],
answer:1
},

{
question:"भारत की राजधानी क्या है ?",
options:[
"दिल्ली",
"लखनऊ",
"जयपुर",
"भोपाल"
],
answer:0
},

{
question:"2 + 2 = ?",
options:[
"2",
"3",
"4",
"5"
],
answer:2
},

{
question:"पानी का रासायनिक सूत्र क्या है ?",
options:[
"H2O",
"CO2",
"O2",
"H2SO4"
],
answer:0
}

];

let currentQuestion = 0;

let answers = new Array(questions.length).fill(null);

let questionStatus =
new Array(questions.length).fill("notVisited");

function loadQuestion(){

document.getElementById("qno").innerText =
currentQuestion + 1;

document.getElementById("questionText").innerText =
questions[currentQuestion].question;

let html = "";

questions[currentQuestion].options.forEach((opt,index)=>{

html += `

<label class="option">

<input type="radio"
name="option"
value="${index}"
${answers[currentQuestion] == index ? "checked" : ""}
onchange="saveAnswer(${index})">

 ${opt}

</label>

`;

});

document.getElementById("optionsBox").innerHTML = html;

updatePalette();

}

function saveAnswer(index){

answers[currentQuestion] = index;

}

function saveAndNext(){

if(answers[currentQuestion] != null){

questionStatus[currentQuestion] = "answered";

}
else{

questionStatus[currentQuestion] = "notAnswered";

}

if(currentQuestion < questions.length - 1){

currentQuestion++;

loadQuestion();

}

}

function markForReview(){

questionStatus[currentQuestion] = "review";

if(currentQuestion < questions.length - 1){

currentQuestion++;

loadQuestion();

}

}

function prevQuestion(){

if(currentQuestion > 0){

currentQuestion--;

loadQuestion();

}

}

function clearAnswer(){

answers[currentQuestion] = null;

questionStatus[currentQuestion] = "notAnswered";

loadQuestion();

}

function createPalette(){

const palette = document.getElementById("palette");

for(let i=0;i<questions.length;i++){

let btn = document.createElement("button");

btn.innerText = i + 1;

btn.className = "qbtn";

btn.onclick = function(){

currentQuestion = i;

loadQuestion();

};

palette.appendChild(btn);

}

}

function updatePalette(){

let btns = document.querySelectorAll(".qbtn");

btns.forEach((btn,index)=>{

btn.className = "qbtn";

if(questionStatus[index] == "answered"){

btn.style.background = "#22c55e";
btn.style.color = "#fff";

}

else if(questionStatus[index] == "notAnswered"){

btn.style.background = "red";
btn.style.color = "#fff";

}

else if(questionStatus[index] == "review"){

btn.style.background = "#facc15";
btn.style.color = "#000";

}

else{

btn.style.background = "#f3f4f6";
btn.style.color = "#000";

}

if(index == currentQuestion){

btn.style.border = "3px solid black";

}
else{

btn.style.border = "1px solid #999";

}

});

}

function submitTest(){

let score = 0;

questions.forEach((q,index)=>{

if(answers[index] == q.answer){

score += 4;

}

else if(answers[index] != null){

score -= 1;

}

});

alert("TEST SUBMITTED\n\nYOUR SCORE : " + score);

}

createPalette();

loadQuestion();


// TIMER

let totalSeconds = 9000;

function startTimer(){

let timer = setInterval(()=>{

let hrs = Math.floor(totalSeconds / 3600);

let mins = Math.floor((totalSeconds % 3600) / 60);

let secs = totalSeconds % 60;

hrs = hrs < 10 ? "0"+hrs : hrs;
mins = mins < 10 ? "0"+mins : mins;
secs = secs < 10 ? "0"+secs : secs;

document.getElementById("time").innerText =
hrs + ":" + mins + ":" + secs;

totalSeconds--;

if(totalSeconds < 0){

clearInterval(timer);

submitTest();

}

},1000);

}

</script>

</body>
</html>
